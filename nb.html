<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Norges Bank">
<meta name="theme-color" content="#0a0f1a">
<title>Norges Bank</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a0f1a;--card:#141b2d;--card-hover:#1a2340;--accent:#0066cc;--accent2:#0099ff;--text:#f0f0f5;--text2:#8892a4;--border:#1e2a42;--green:#00c853;--red:#ff3d57;--safe-bottom:env(safe-area-inset-bottom,0px)}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;padding-bottom:calc(70px + var(--safe-bottom));min-height:100vh;min-height:100dvh}
.header{position:sticky;top:0;z-index:100;background:rgba(10,15,26,0.92);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);padding:calc(env(safe-area-inset-top,20px) + 8px) 20px 12px;border-bottom:1px solid var(--border)}
.header h1{font-size:20px;font-weight:700;letter-spacing:-0.3px}
.header .subtitle{font-size:12px;color:var(--text2);margin-top:2px}
.tab-bar{position:fixed;bottom:0;left:0;right:0;z-index:200;display:flex;background:rgba(10,15,26,0.95);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);border-top:1px solid var(--border);padding-bottom:var(--safe-bottom)}
.tab-bar button{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px 0;border:none;background:none;color:var(--text2);font-size:10px;font-family:inherit;cursor:pointer;transition:color .2s}
.tab-bar button.active{color:var(--accent2)}
.tab-bar button .icon{font-size:22px;line-height:1}
.view{display:none;padding:16px;animation:fadeIn .3s ease}
.view.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.date-label{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:6px}
.date-label::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green)}
.currency-list{display:flex;flex-direction:column;gap:10px}
.currency-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:all .2s;-webkit-user-select:none;user-select:none}
.currency-card:active{background:var(--card-hover);transform:scale(0.98)}
.cc-left{display:flex;align-items:center;gap:12px}
.cc-code{font-size:18px;font-weight:700;width:48px}
.cc-name{font-size:13px;color:var(--text2);max-width:140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cc-rate{font-size:20px;font-weight:600;text-align:right;font-variant-numeric:tabular-nums}
.cc-arrow{color:var(--text2);margin-left:8px;font-size:16px}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 0;gap:14px;color:var(--text2)}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent2);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.modal-overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,0.8);display:none;align-items:flex-end;justify-content:center;animation:fadeModal .25s ease}
.modal-overlay.show{display:flex}
@keyframes fadeModal{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg);width:100%;max-width:500px;height:92vh;border-radius:20px 20px 0 0;padding:20px;display:flex;flex-direction:column;animation:slideUp .3s ease;overflow-y:auto}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:5px;border-radius:3px;background:var(--border);margin:0 auto 16px}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-header h2{font-size:22px;font-weight:700}
.modal-close{width:32px;height:32px;border-radius:50%;background:var(--card);border:1px solid var(--border);color:var(--text);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.range-btns{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.range-btns button{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--text2);font-size:13px;font-family:inherit;cursor:pointer;transition:all .2s}
.range-btns button.active{background:var(--accent);border-color:var(--accent);color:#fff}
.chart-container{flex:1;min-height:250px;position:relative}
.chart-stats{display:flex;gap:12px;margin-top:16px;flex-wrap:wrap}
.stat-box{flex:1;min-width:80px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center}
.stat-box .label{font-size:11px;color:var(--text2);margin-bottom:4px}
.stat-box .value{font-size:17px;font-weight:700;font-variant-numeric:tabular-nums}
.policy-rate-card{background:linear-gradient(135deg,#0a2463,#0066cc);border-radius:18px;padding:28px;text-align:center;margin-bottom:20px;position:relative;overflow:hidden;cursor:pointer;-webkit-user-select:none;user-select:none;transition:transform .2s}
.policy-rate-card:active{transform:scale(0.97)}
.policy-rate-card::after{content:'';position:absolute;top:-30%;right:-15%;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,0.05)}
.policy-rate-card .pr-label{font-size:14px;opacity:0.8;letter-spacing:0.5px;text-transform:uppercase}
.policy-rate-card .pr-value{font-size:52px;font-weight:800;margin:8px 0;font-variant-numeric:tabular-nums}
.policy-rate-card .pr-sub{font-size:13px;opacity:0.7}
.section-title{font-size:16px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.yield-chart-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:16px}
.yield-chart-inner{height:260px;position:relative}
.rates-table{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.rates-table .rt-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border)}
.rates-table .rt-row:last-child{border-bottom:none}
.rates-table .rt-tenor{font-weight:600;font-size:15px}
.rates-table .rt-rate{font-size:16px;font-variant-numeric:tabular-nums;color:var(--accent2)}
.error-msg{color:var(--red);text-align:center;padding:20px;font-size:14px}
.refresh-btn{display:inline-flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border);color:var(--text2);padding:6px 14px;border-radius:20px;font-size:12px;font-family:inherit;cursor:pointer;margin-left:auto;transition:all .2s}
.refresh-btn:active{background:var(--card-hover);transform:scale(0.95)}
.press-release-link{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:20px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .2s;-webkit-user-select:none;user-select:none;text-decoration:none;color:var(--text)}
.press-release-link:active{background:var(--card-hover);transform:scale(0.98)}
.press-release-link .prl-icon{font-size:24px;flex-shrink:0}
.press-release-link .prl-text{flex:1;min-width:0}
.press-release-link .prl-title{font-size:14px;font-weight:600;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.press-release-link .prl-date{font-size:11px;color:var(--text2);margin-top:3px}
.press-release-link .prl-arrow{color:var(--text2);font-size:18px;flex-shrink:0}
</style>
</head>
<body>


<div class="header">
  <h1>&#x1F1F3;&#x1F1F4; Norges Bank</h1>
  <div class="subtitle">Exchange Rates &amp; Interest Rates</div>
</div>

<div id="currencyView" class="view active">
  <div style="display:flex;align-items:center;margin-bottom:14px">
    <div class="date-label" id="rateDate">Loading rates&hellip;</div>
    <button class="refresh-btn" onclick="loadCurrencies()">&#x21BB; Refresh</button>
  </div>
  <div id="currencyList" class="currency-list">
    <div class="loading"><div class="spinner"></div><span>Fetching exchange rates&hellip;</span></div>
  </div>
</div>

<div id="interestView" class="view">
  <div id="interestContent">
    <div class="loading"><div class="spinner"></div><span>Fetching interest rates&hellip;</span></div>
  </div>
</div>

<div class="modal-overlay" id="chartModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <h2 id="modalTitle">USD/NOK</h2>
      <button class="modal-close" onclick="closeModal()">&#x2715;</button>
    </div>
    <div class="range-btns" id="rangeBtns"></div>
    <div class="chart-container"><canvas id="histChart"></canvas></div>
    <div class="chart-stats" id="chartStats"></div>
  </div>
</div>

<div class="tab-bar">
  <button class="active" onclick="switchTab('currency')"><span class="icon">&#x1F4B1;</span>Currency</button>
  <button onclick="switchTab('interest')"><span class="icon">&#x1F4C8;</span>Interest</button>
</div>

<script>

// ===== TAB SWITCHING =====
var currentTab = 'currency';
var interestLoaded = false;

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.view').forEach(function(v) { v.classList.remove('active'); });
  document.querySelectorAll('.tab-bar button').forEach(function(b) { b.classList.remove('active'); });
  if (tab === 'currency') {
    document.getElementById('currencyView').classList.add('active');
    document.querySelectorAll('.tab-bar button')[0].classList.add('active');
  } else {
    document.getElementById('interestView').classList.add('active');
    document.querySelectorAll('.tab-bar button')[1].classList.add('active');
    if (!interestLoaded) { loadInterest(); interestLoaded = true; }
  }
}

// ===== CURRENCY VIEW =====
var PRIORITY = ['USD','EUR','GBP','SEK','DKK','CHF'];
var ALPHA = ['AUD','BRL','CAD','CZK','JPY','PLN','KRW','TRY'];
var ALL_CUR = PRIORITY.concat(ALPHA);
var BASE_EXR = 'https://data.norges-bank.no/api/data/EXR/B.';

function parseSpotResponse(json) {
  var ds = json.data.dataSets[0];
  var st = json.data.structure;
  var seriesKey = Object.keys(ds.series)[0];
  var obs = ds.series[seriesKey].observations;
  var obsKey = Object.keys(obs)[0];
  var value = parseFloat(obs[obsKey][0]);
  var dateValues = st.dimensions.observation[0].values;
  var date = dateValues[parseInt(obsKey)].id;
  var name = st.dimensions.series[1].values[0].name;
  return { value: value, date: date, name: name };
}

var ratesCache = {};

async function fetchRate(cur) {
  var url = BASE_EXR + cur + '.NOK.SP?format=sdmx-json&lastNObservations=1&locale=en';
  var res = await fetch(url);
  if (!res.ok) throw new Error('Failed: ' + cur);
  var json = await res.json();
  return parseSpotResponse(json);
}

async function loadCurrencies() {
  var list = document.getElementById('currencyList');
  list.innerHTML = '<div class="loading"><div class="spinner"></div><span>Fetching exchange rates\u2026</span></div>';
  document.getElementById('rateDate').textContent = 'Loading rates\u2026';

  var promises = ALL_CUR.map(async function(cur) {
    try {
      var data = await fetchRate(cur);
      ratesCache[cur] = data;
      return { cur: cur, value: data.value, date: data.date, name: data.name, error: false };
    } catch(e) {
      return { cur: cur, value: null, date: '', name: cur, error: true };
    }
  });
  var settled = await Promise.all(promises);

  var latestDate = '';
  list.innerHTML = '';
  for (var i = 0; i < ALL_CUR.length; i++) {
    var cur = ALL_CUR[i];
    var r = settled.find(function(s) { return s.cur === cur; });
    if (!r || r.error) {
      var card = document.createElement('div');
      card.className = 'currency-card';
      card.innerHTML = '<div class="cc-left"><span class="cc-code">' + cur + '</span><span class="cc-name" style="color:var(--red)">Unavailable</span></div><span class="cc-rate">\u2014</span>';
      list.appendChild(card);
      continue;
    }
    if (r.date > latestDate) latestDate = r.date;
    var card = document.createElement('div');
    card.className = 'currency-card';
    card.onclick = (function(c, n, v) { return function() { openChart(c, n, v); }; })(cur, r.name, r.value);
    card.innerHTML = '<div class="cc-left"><span class="cc-code">' + cur + '</span><span class="cc-name">' + r.name + '</span></div><div style="display:flex;align-items:center"><span class="cc-rate">' + r.value.toFixed(4) + '</span><span class="cc-arrow">\u203A</span></div>';
    list.appendChild(card);
  }
  if (latestDate) {
    document.getElementById('rateDate').textContent = 'Rates as of ' + latestDate;
  }
}

// ===== CHART MODAL =====
var histChartInstance = null;
var currentModalCur = '';
var currentModalType = 'currency';

function openModal() {
  document.getElementById('chartModal').classList.add('show');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  document.getElementById('chartModal').classList.remove('show');
  document.body.style.overflow = '';
  if (histChartInstance) { histChartInstance.destroy(); histChartInstance = null; }
}

// Dynamic range buttons
function setRangeButtons(buttons, activeDays) {
  var container = document.getElementById('rangeBtns');
  container.innerHTML = '';
  buttons.forEach(function(b) {
    var btn = document.createElement('button');
    btn.dataset.range = b.days;
    btn.textContent = b.label;
    if (b.days === activeDays) btn.classList.add('active');
    btn.addEventListener('click', function() {
      container.querySelectorAll('button').forEach(function(x) { x.classList.remove('active'); });
      btn.classList.add('active');
      var days = parseInt(btn.dataset.range);
      if (currentModalType === 'policyrate') {
        loadPolicyRateHistorical(days);
      } else {
        loadHistorical(currentModalCur, days);
      }
    });
    container.appendChild(btn);
  });
}

// Open currency chart
function openChart(cur, name, currentValue) {
  currentModalType = 'currency';
  currentModalCur = cur;
  document.getElementById('modalTitle').textContent = cur + '/NOK';
  setRangeButtons([
    {label:'1M',days:30},
    {label:'3M',days:90},
    {label:'6M',days:180},
    {label:'1Y',days:365},
    {label:'2Y',days:730},
    {label:'5Y',days:1825}
  ], 365);
  openModal();
  loadHistorical(cur, 365);
}

// Open policy rate chart
function openPolicyRateChart() {
  currentModalType = 'policyrate';
  document.getElementById('modalTitle').textContent = 'Policy Rate (Styringsrenten)';
  setRangeButtons([
    {label:'1Y',days:365},
    {label:'2Y',days:730},
    {label:'5Y',days:1825},
    {label:'10Y',days:3650},
    {label:'20Y',days:7300}
  ], 1825);
  openModal();
  loadPolicyRateHistorical(1825);
}

// Load historical currency data
async function loadHistorical(cur, days) {
  var canvas = document.getElementById('histChart');
  var stats = document.getElementById('chartStats');
  if (histChartInstance) { histChartInstance.destroy(); histChartInstance = null; }
  stats.innerHTML = '<div class="loading" style="width:100%;padding:20px"><div class="spinner"></div></div>';

  var end = new Date();
  var start = new Date();
  start.setDate(end.getDate() - days);
  var sp = start.toISOString().slice(0,10);
  var ep = end.toISOString().slice(0,10);
  var url = BASE_EXR + cur + '.NOK.SP?format=sdmx-json&startPeriod=' + sp + '&endPeriod=' + ep + '&locale=en';

  try {
    var res = await fetch(url);
    var json = await res.json();
    var ds = json.data.dataSets[0];
    var st = json.data.structure;
    var seriesKey = Object.keys(ds.series)[0];
    var observations = ds.series[seriesKey].observations;
    var dateValues = st.dimensions.observation[0].values;

    var dates = [];
    var values = [];
    var keys = Object.keys(observations).map(Number).sort(function(a,b){return a-b;});
    for (var i = 0; i < keys.length; i++) {
      dates.push(dateValues[keys[i]].id);
      values.push(parseFloat(observations[keys[i]][0]));
    }

    var minVal = Math.min.apply(null, values);
    var maxVal = Math.max.apply(null, values);
    var curVal = values[values.length - 1];
    var firstVal = values[0];
    var change = curVal - firstVal;
    var changePct = ((change / firstVal) * 100).toFixed(2);
    var lineColor = change >= 0 ? '#00c853' : '#ff3d57';

    var ctx = canvas.getContext('2d');
    var gradient = ctx.createLinearGradient(0, 0, 0, 300);
    gradient.addColorStop(0, change >= 0 ? 'rgba(0,200,83,0.25)' : 'rgba(255,61,87,0.25)');
    gradient.addColorStop(1, 'rgba(0,0,0,0)');

    histChartInstance = new Chart(ctx, {
      type: 'line',
      data: {
        labels: dates,
        datasets: [{
          data: values,
          borderColor: lineColor,
          backgroundColor: gradient,
          fill: true,
          tension: 0.3,
          pointRadius: 0,
          pointHitRadius: 10,
          borderWidth: 2
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { intersect: false, mode: 'index' },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: 'rgba(20,27,45,0.95)',
            titleColor: '#f0f0f5',
            bodyColor: '#f0f0f5',
            borderColor: '#1e2a42',
            borderWidth: 1,
            padding: 10,
            displayColors: false,
            callbacks: {
              label: function(c) { return cur + '/NOK: ' + c.parsed.y.toFixed(4); }
            }
          }
        },
        scales: {
          x: {
            display: true,
            ticks: { color: '#8892a4', maxTicksLimit: 6, maxRotation: 0, font: { size: 11 } },
            grid: { color: 'rgba(30,42,66,0.5)' }
          },
          y: {
            display: true,
            ticks: { color: '#8892a4', font: { size: 11 }, callback: function(v) { return v.toFixed(2); } },
            grid: { color: 'rgba(30,42,66,0.5)' }
          }
        }
      }
    });

    stats.innerHTML =
      '<div class="stat-box"><div class="label">Current</div><div class="value">' + curVal.toFixed(4) + '</div></div>' +
      '<div class="stat-box"><div class="label">Min</div><div class="value">' + minVal.toFixed(4) + '</div></div>' +
      '<div class="stat-box"><div class="label">Max</div><div class="value">' + maxVal.toFixed(4) + '</div></div>' +
      '<div class="stat-box"><div class="label">Change</div><div class="value" style="color:' + lineColor + '">' + (change >= 0 ? '+' : '') + changePct + '%</div></div>';
  } catch(e) {
    stats.innerHTML = '<div class="error-msg">Failed to load historical data. Please try again.</div>';
  }
}

// Load historical policy rate data
async function loadPolicyRateHistorical(days) {
  var canvas = document.getElementById('histChart');
  var stats = document.getElementById('chartStats');
  if (histChartInstance) { histChartInstance.destroy(); histChartInstance = null; }
  stats.innerHTML = '<div class="loading" style="width:100%;padding:20px"><div class="spinner"></div></div>';

  var end = new Date();
  var start = new Date();
  start.setDate(end.getDate() - days);
  var sp = start.toISOString().slice(0,10);
  var ep = end.toISOString().slice(0,10);
  var url = 'https://data.norges-bank.no/api/data/IR/B.KPRA.SD.?format=sdmx-json&startPeriod=' + sp + '&endPeriod=' + ep + '&locale=en';

  try {
    var res = await fetch(url);
    var json = await res.json();
    var ds = json.data.dataSets[0];
    var st = json.data.structure;
    var seriesKey = Object.keys(ds.series)[0];
    var observations = ds.series[seriesKey].observations;
    var dateValues = st.dimensions.observation[0].values;

    var dates = [];
    var values = [];
    var keys = Object.keys(observations).map(Number).sort(function(a,b){return a-b;});
    for (var i = 0; i < keys.length; i++) {
      dates.push(dateValues[keys[i]].id);
      values.push(parseFloat(observations[keys[i]][0]));
    }

    var minVal = Math.min.apply(null, values);
    var maxVal = Math.max.apply(null, values);
    var curVal = values[values.length - 1];
    var firstVal = values[0];
    var change = curVal - firstVal;
    var lineColor = change <= 0 ? '#00c853' : '#ff3d57';

    var ctx = canvas.getContext('2d');
    var gradient = ctx.createLinearGradient(0, 0, 0, 300);
    gradient.addColorStop(0, 'rgba(0,153,255,0.25)');
    gradient.addColorStop(1, 'rgba(0,0,0,0)');

    histChartInstance = new Chart(ctx, {
      type: 'line',
      data: {
        labels: dates,
        datasets: [{
          data: values,
          borderColor: '#0099ff',
          backgroundColor: gradient,
          fill: true,
          stepped: 'before',
          pointRadius: 0,
          pointHitRadius: 10,
          borderWidth: 2.5
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { intersect: false, mode: 'index' },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: 'rgba(20,27,45,0.95)',
            titleColor: '#f0f0f5',
            bodyColor: '#f0f0f5',
            borderColor: '#1e2a42',
            borderWidth: 1,
            padding: 10,
            displayColors: false,
            callbacks: {
              label: function(c) { return 'Policy Rate: ' + c.parsed.y.toFixed(2) + '%'; }
            }
          }
        },
        scales: {
          x: {
            display: true,
            ticks: { color: '#8892a4', maxTicksLimit: 6, maxRotation: 0, font: { size: 11 } },
            grid: { color: 'rgba(30,42,66,0.5)' }
          },
          y: {
            display: true,
            ticks: { color: '#8892a4', font: { size: 11 }, callback: function(v) { return v.toFixed(2) + '%'; } },
            grid: { color: 'rgba(30,42,66,0.5)' }
          }
        }
      }
    });

    var changeBps = (change * 100).toFixed(0);
    stats.innerHTML =
      '<div class="stat-box"><div class="label">Current</div><div class="value">' + curVal.toFixed(2) + '%</div></div>' +
      '<div class="stat-box"><div class="label">Min</div><div class="value">' + minVal.toFixed(2) + '%</div></div>' +
      '<div class="stat-box"><div class="label">Max</div><div class="value">' + maxVal.toFixed(2) + '%</div></div>' +
      '<div class="stat-box"><div class="label">Change</div><div class="value" style="color:' + lineColor + '">' + (change >= 0 ? '+' : '') + changeBps + ' bps</div></div>';
  } catch(e) {
    stats.innerHTML = '<div class="error-msg">Failed to load policy rate history. Please try again.</div>';
  }
}

// ===== PRESS RELEASE LOADER =====
async function loadPolicyPressRelease() {
  var placeholder = document.getElementById('policyPressRelease');
  if (!placeholder) return;
  placeholder.innerHTML = '<div style="text-align:center;padding:8px;color:var(--text2);font-size:12px">Loading latest decision\u2026</div>';

  var rssUrl = 'https://www.norges-bank.no/en/rss-feeds/Press-releases---Norges-Bank/';
  var xmlText = '';

  try {
    var res = await fetch(rssUrl);
    if (res.ok) {
      xmlText = await res.text();
    }
  } catch(e) {}

  if (!xmlText) {
    try {
      var proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(rssUrl);
      var res2 = await fetch(proxyUrl);
      if (res2.ok) {
        xmlText = await res2.text();
      }
    } catch(e) {}
  }

  if (!xmlText) {
    placeholder.innerHTML = '';
    return;
  }

  try {
    var parser = new DOMParser();
    var xmlDoc = parser.parseFromString(xmlText, 'text/xml');
    var items = xmlDoc.querySelectorAll('item');
    var found = null;

    for (var i = 0; i < items.length; i++) {
      var titleEl = items[i].querySelector('title');
      if (titleEl && titleEl.textContent.toLowerCase().includes('policy rate')) {
        found = items[i];
        break;
      }
    }

    if (!found) {
      placeholder.innerHTML = '';
      return;
    }

    var title = found.querySelector('title').textContent.trim();
    var link = found.querySelector('link').textContent.trim();
    var pubDateRaw = found.querySelector('pubDate');
    var dateStr = '';
    if (pubDateRaw) {
      var d = new Date(pubDateRaw.textContent.trim());
      dateStr = d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    placeholder.innerHTML =
      '<a class="press-release-link" href="' + link + '" target="_blank" rel="noopener noreferrer">' +
      '<span class="prl-icon">&#x1F4F0;</span>' +
      '<div class="prl-text">' +
      '<div class="prl-title">' + title + '</div>' +
      (dateStr ? '<div class="prl-date">' + dateStr + '</div>' : '') +
      '</div>' +
      '<span class="prl-arrow">&#x2197;</span>' +
      '</a>';
  } catch(e) {
    placeholder.innerHTML = '';
  }
}

// ===== INTEREST VIEW =====
async function loadInterest() {
  var container = document.getElementById('interestContent');
  container.innerHTML = '<div class="loading"><div class="spinner"></div><span>Fetching interest rates\u2026</span></div>';

  try {
    // Fetch policy rate
    var prRes = await fetch('https://data.norges-bank.no/api/data/IR/B.KPRA.SD.?format=sdmx-json&lastNObservations=1&locale=no');
    var prJson = await prRes.json();
    var prDs = prJson.data.dataSets[0];
    var prSeriesKey = Object.keys(prDs.series)[0];
    var prObs = prDs.series[prSeriesKey].observations;
    var prObsKey = Object.keys(prObs)[0];
    var policyRate = parseFloat(prObs[prObsKey][0]);
    var prDate = prJson.data.structure.dimensions.observation[0].values[parseInt(prObsKey)].id;

    // Fetch yield curve tenors
    var tbilTenors = ['3M','6M','12M'];
    var gbonTenors = ['3Y','5Y','7Y','10Y'];
    var allTenors = tbilTenors.concat(gbonTenors);
    var tenorLabels = ['3M','6M','12M','3Y','5Y','7Y','10Y'];

    var tenorPromises = allTenors.map(function(t) {
      var type = tbilTenors.indexOf(t) >= 0 ? 'TBIL' : 'GBON';
      var url = 'https://data.norges-bank.no/api/data/GOVT_GENERIC_RATES/B.' + t + '.' + type + '.?format=sdmx-json&lastNObservations=1&locale=en';
      return fetch(url).then(function(r) { return r.json(); }).then(function(json) {
        var ds = json.data.dataSets[0];
        var sk = Object.keys(ds.series)[0];
        var obs = ds.series[sk].observations;
        var ok = Object.keys(obs)[0];
        return { tenor: t, rate: parseFloat(obs[ok][0]) };
      }).catch(function() { return { tenor: t, rate: null }; });
    });

    var tenorResults = await Promise.all(tenorPromises);
    var rateMap = {};
    tenorResults.forEach(function(r) { rateMap[r.tenor] = r.rate; });

    // Build HTML
    var html =
      '<div class="policy-rate-card" onclick="openPolicyRateChart()">' +
      '<div class="pr-label">Policy Rate (Styringsrenten)</div>' +
      '<div class="pr-value">' + policyRate.toFixed(2) + '%</div>' +
      '<div class="pr-sub">As of ' + prDate + ' \u00B7 Tap for history \u203A</div>' +
      '</div>' +
      '<div id="policyPressRelease"></div>' +
      '<div class="section-title">&#x1F3DB;&#xFE0F; Government Yield Curve</div>' +
      '<div class="yield-chart-wrap"><div class="yield-chart-inner"><canvas id="yieldChart"></canvas></div></div>' +
      '<div class="section-title">&#x1F4CA; Generic Rates</div>' +
      '<div class="rates-table">';

    for (var i = 0; i < tenorLabels.length; i++) {
      var t = tenorLabels[i];
      var v = rateMap[t];
      html += '<div class="rt-row"><span class="rt-tenor">' + t + '</span><span class="rt-rate">' + (v !== null ? v.toFixed(3) + '%' : '\u2014') + '</span></div>';
    }
    html += '</div>';
    container.innerHTML = html;

    // Render yield curve chart
    var yieldValues = tenorLabels.map(function(t) { return rateMap[t]; });
    var ctx = document.getElementById('yieldChart').getContext('2d');
    var grad = ctx.createLinearGradient(0, 0, 0, 260);
    grad.addColorStop(0, 'rgba(0,102,204,0.3)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');

    new Chart(ctx, {
      type: 'line',
      data: {
        labels: tenorLabels,
        datasets: [{
          data: yieldValues,
          borderColor: '#0099ff',
          backgroundColor: grad,
          fill: true,
          tension: 0.4,
          pointRadius: 5,
          pointBackgroundColor: '#0099ff',
          pointBorderColor: '#0a0f1a',
          pointBorderWidth: 2,
          borderWidth: 2.5
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: 'rgba(20,27,45,0.95)',
            titleColor: '#f0f0f5',
            bodyColor: '#f0f0f5',
            borderColor: '#1e2a42',
            borderWidth: 1,
            padding: 10,
            displayColors: false,
            callbacks: {
              label: function(c) { return c.parsed.y.toFixed(3) + '%'; }
            }
          }
        },
        scales: {
          x: {
            ticks: { color: '#8892a4', font: { size: 12, weight: '600' } },
            grid: { color: 'rgba(30,42,66,0.5)' }
          },
          y: {
            ticks: { color: '#8892a4', font: { size: 11 }, callback: function(v) { return v.toFixed(2) + '%'; } },
            grid: { color: 'rgba(30,42,66,0.5)' }
          }
        }
      }
    });

    // Load press release link
    loadPolicyPressRelease();

  } catch(e) {
    container.innerHTML = '<div class="error-msg">Failed to load interest rate data. Please try again.</div>';
  }
}
