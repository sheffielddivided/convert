<!doctype html>
<html lang="no">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Sveitsisk selskapsregister</title>

<style>

body{
font-family:system-ui;
max-width:1000px;
margin:40px auto;
padding:20px;
}

h1{
margin-bottom:20px;
}

.search{
display:flex;
gap:10px;
}

input{
flex:1;
padding:14px;
font-size:16px;
}

button{
padding:14px 22px;
cursor:pointer;
}

#status{
margin-top:16px;
color:#555;
}

.result{
border:1px solid #ddd;
border-radius:10px;
padding:16px;
margin-top:12px;
}

.name{
font-size:18px;
font-weight:700;
}

.row{
margin-top:6px;
}

.error{
background:#ffe9e9;
padding:12px;
border-radius:8px;
}

</style>

</head>

<body>

<h1>Sveitsisk selskapsregister</h1>

<div class="search">

<input
id="query"
placeholder="Søk på selskapsnavn eller CHE-nummer"
/>

<button onclick="search()">
Søk
</button>

</div>

<div id="status"></div>

<div id="results"></div>

<script>

const API =
"https://snowy-frog-db9f.batil-kjekken.workers.dev";

async function search(){

const q =
document
.getElementById("query")
.value
.trim();

if(!q){
return;
}

status.textContent =
"Søker …";

results.innerHTML =
"";

try{

const r =
await fetch(
`${API}?q=${
encodeURIComponent(q)
}`
);

const text =
await r.text();

let data;

try{

data =
JSON.parse(
text
);

}
catch{

throw new Error(
text
);

}

if(!r.ok){

throw new Error(

data.error
||
JSON.stringify(
data
)

);

}

status.textContent =
`${data.length} treff`;

if(
!Array.isArray(
data
)
||
data.length===0
){

results.innerHTML =
`
<div class="result">
Ingen treff
</div>
`;

return;

}

results.innerHTML =
data
.slice(
0,
10
)
.map(
company=>`

<div class="result">

<div class="name">

${
company.name
||
"Ukjent"
}

</div>

<div class="row">

UID:
<b>

${
company.uid
||
"—"
}

</b>

</div>

<div class="row">

Status:
${
company.status
||
"—"
}

</div>

<div class="row">

Sete:
${
company.legalSeat
||
"—"
}

</div>

<div class="row">

Adresse:
${
company.address
||
"—"
}

</div>

</div>

`
)
.join("");

}
catch(err){

status.textContent =
"";

results.innerHTML =
`
<div class="error">

Feil:

<br><br>

${err.message}

</div>
`;

console.error(
err
);

}

}

document
.getElementById(
"query"
)
.addEventListener(
"keydown",
e=>{

if(
e.key==="Enter"
){

search();

}

}
);

</script>

</body>

</html>
