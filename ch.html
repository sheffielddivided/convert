<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Sveitsisk selskapsregister</title>

<style>
body {
    font-family: system-ui;
    max-width: 900px;
    margin: 40px auto;
    padding: 20px;
}

input {
    width: 100%;
    padding: 12px;
    font-size: 16px;
}

button {
    margin-top: 10px;
    padding: 10px 18px;
}

.result {
    border: 1px solid #ddd;
    padding: 14px;
    margin-top: 10px;
    border-radius: 8px;
}

.small {
    color: #666;
}
</style>
</head>

<body>

<h1>Søk i sveitsisk selskapsregister</h1>

<input
    id="query"
    placeholder="Navn eller CHE-nummer (f.eks. CHE-449.838.153)"
>

<button onclick="search()">Søk</button>

<div id="status"></div>
<div id="results"></div>

<script>

async function zefixSearch(searchText) {

    const endpoints = [
        // søk som navn
        fetch(
            `https://www.zefix.admin.ch/ZefixPublicREST/api/v1/company/search?name=${encodeURIComponent(searchText)}`
        ),

        // søk som uid
        fetch(
            `https://www.zefix.admin.ch/ZefixPublicREST/api/v1/company/search?uid=${encodeURIComponent(searchText)}`
        )
    ];

    const responses = await Promise.allSettled(endpoints);

    let merged = [];

    for (const r of responses) {

        if (r.status !== "fulfilled")
            continue;

        if (!r.value.ok)
            continue;

        const json = await r.value.json();

        if (Array.isArray(json))
            merged.push(...json);
    }

    // fjern duplikater på uid
    const unique =
        Object.values(
            merged.reduce((acc, company) => {

                const key =
                    company.uid ||
                    company.ehid ||
                    company.name;

                acc[key] = company;

                return acc;

            }, {})
        );

    return unique.slice(0, 10);
}

async function search() {

    const q =
        document
            .getElementById("query")
            .value
            .trim();

    if (!q)
        return;

    results.innerHTML = "";
    status.textContent = "Søker…";

    try {

        const data =
            await zefixSearch(q);

        status.textContent =
            `${data.length} treff`;

        results.innerHTML =
            data.map(c => `
                <div class="result">

                    <strong>${c.name ?? "-"}</strong>

                    <div>
                        UID:
                        ${c.uid ?? "-"}
                    </div>

                    <div>
                        Status:
                        ${c.status ?? "-"}
                    </div>

                    <div>
                        Kommune:
                        ${c.legalSeat ?? "-"}
                    </div>

                </div>
            `).join("");

        if (!data.length)
            results.innerHTML =
                "<p>Ingen treff</p>";

    }

    catch (e) {

        status.textContent =
            "Feil ved oppslag";

        console.error(e);

    }

}

document
.getElementById("query")
.addEventListener(
    "keydown",
    e => {
        if (e.key === "Enter")
            search();
    });

</script>

</body>
</html>
