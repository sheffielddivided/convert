<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>PDMR Søk</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#f0f4f8;--card:#ffffff;--accent:#0055b3;--text:#1a2035;--text2:#64748b;--border:#dde3ed;--red:#dc2626;--green:#16a34a}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:env(safe-area-inset-bottom,16px)}
.header{background:var(--card);border-bottom:1px solid var(--border);padding:calc(env(safe-area-inset-top,16px) + 14px) 16px 14px;position:sticky;top:0;z-index:10}
.header h1{font-size:20px;font-weight:800;color:var(--text);letter-spacing:-0.3px}
.header .sub{font-size:12px;color:var(--text2);margin-top:2px}
.search-wrap{padding:14px 16px;background:var(--card);border-bottom:1px solid var(--border)}
.search-row{display:flex;gap:8px;align-items:center}
.search-input{flex:1;padding:10px 14px;border-radius:12px;border:1.5px solid var(--border);background:var(--bg);font-size:15px;font-family:inherit;color:var(--text);outline:none;transition:border-color .15s}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--text2)}
.clear-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--border);background:var(--bg);color:var(--text2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.clear-btn:active{transform:scale(0.92)}
.filter-row{display:flex;gap:8px;margin-top:10px}
.filter-btn{padding:5px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--bg);color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.content{padding:16px}
.meta{font-size:12px;color:var(--text2);margin-bottom:12px}
.result-card{background:var(--card);border-radius:14px;border:1px solid var(--border);margin-bottom:10px;overflow:hidden}
.result-company{padding:10px 14px 8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.ticker-badge{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:2px 7px;border-radius:6px;letter-spacing:0.3px;flex-shrink:0}
.company-name{font-size:13px;font-weight:700;color:var(--text)}
.insider-row{padding:9px 14px;display:flex;flex-direction:column;gap:2px;border-bottom:1px solid var(--border)}
.insider-row:last-child{border-bottom:none}
.insider-name{font-size:14px;font-weight:600;color:var(--text)}
.insider-name mark{background:rgba(0,85,179,0.15);color:var(--accent);border-radius:3px;padding:0 2px}
.insider-meta{font-size:12px;color:var(--text2)}
.empty{text-align:center;padding:40px 20px;color:var(--text2)}
.empty .icon{font-size:36px;margin-bottom:8px}
.loading{text-align:center;padding:40px 20px;color:var(--text2);font-size:14px}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.updated{font-size:11px;color:var(--text2);text-align:right;margin-top:8px}
</style>
</head>
<body>
<div class="header">
  <h1>🔍 PDMR Søk</h1>
  <div class="sub">Primærinnsidere på Oslo Børs</div>
</div>
<div class="search-wrap">
  <div class="search-row">
    <input class="search-input" id="q" type="search" placeholder="Søk på navn eller selskap…" oninput="onSearch()" autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="clear-btn" onclick="clearSearch()" title="Tøm">✕</button>
  </div>
  <div class="filter-row">
    <button class="filter-btn active" id="f-all" onclick="setFilter('all')">Alle</button>
    <button class="filter-btn" id="f-person" onclick="setFilter('person')">Person</button>
    <button class="filter-btn" id="f-company" onclick="setFilter('company')">Selskap</button>
  </div>
</div>
<div class="content" id="content">
  <div class="loading"><div class="spinner"></div>Laster data…</div>
</div>

<script>
var allData = null;
var updatedAt = '';
var filterMode = 'all';

fetch('data/primary-insiders.json')
  .then(function(r){ return r.json(); })
  .then(function(d){
    allData = d.companies;
    updatedAt = d.updated ? new Date(d.updated).toLocaleDateString('no-NO',{day:'2-digit',month:'2-digit',year:'numeric'}) : '';
    render('');
  })
  .catch(function(){
    document.getElementById('content').innerHTML = '<div class="empty"><div class="icon">⚠️</div>Kunne ikke laste data.</div>';
  });

function setFilter(mode) {
  filterMode = mode;
  ['all','person','company'].forEach(function(m){
    document.getElementById('f-'+m).classList.toggle('active', m === mode);
  });
  onSearch();
}

function clearSearch() {
  document.getElementById('q').value = '';
  render('');
}

function onSearch() {
  render(document.getElementById('q').value.trim());
}

function hl(text, q) {
  if (!q) return text;
  var re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

function render(q) {
  var content = document.getElementById('content');
  if (!allData) return;

  var ql = q.toLowerCase();
  var results = [];

  allData.forEach(function(company) {
    var compMatch = !ql ||
      company.name.toLowerCase().includes(ql) ||
      company.ticker.toLowerCase().includes(ql) ||
      company.isin.toLowerCase().includes(ql);

    var matchedInsiders = [];
    company.insiders.forEach(function(ins) {
      var surname = ins['SURNAME\nUNSORTED'] || '';
      var firstname = ins['FIRST NAME\nUNSORTED'] || '';
      var fullname = (firstname + ' ' + surname).trim();
      var title = ins['TITLE \nUNSORTED'] || '';
      var position = ins['POSITION\nUNSORTED'] || '';

      var personMatch = !ql ||
        surname.toLowerCase().includes(ql) ||
        firstname.toLowerCase().includes(ql) ||
        fullname.toLowerCase().includes(ql);

      var include = false;
      if (filterMode === 'all') include = !ql || compMatch || personMatch;
      else if (filterMode === 'person') include = personMatch;
      else if (filterMode === 'company') include = compMatch;

      if (include) matchedInsiders.push({fullname: fullname, title: title, position: position});
    });

    if (matchedInsiders.length) {
      results.push({company: company, insiders: matchedInsiders});
    }
  });

  if (!q && filterMode === 'all') {
    var total = allData.reduce(function(s,c){return s+c.insiders.length;},0);
    content.innerHTML =
      '<div class="meta">' + allData.length + ' selskaper · ' + total + ' innsidere</div>' +
      '<div class="updated">Oppdatert ' + updatedAt + '</div>';
    return;
  }

  if (!results.length) {
    content.innerHTML = '<div class="empty"><div class="icon">🔎</div>Ingen treff på «' + q + '»</div>';
    return;
  }

  var totalHits = results.reduce(function(s,r){return s+r.insiders.length;},0);
  var html = '<div class="meta">' + totalHits + ' treff i ' + results.length + ' selskap' + (results.length !== 1 ? 'er' : '') + '</div>';

  results.forEach(function(r) {
    html += '<div class="result-card">';
    html += '<div class="result-company"><span class="ticker-badge">' + r.company.ticker + '</span><span class="company-name">' + hl(r.company.name, q) + '</span></div>';
    r.insiders.forEach(function(ins) {
      var meta = [ins.title, ins.position].filter(Boolean).join(' · ');
      html += '<div class="insider-row"><div class="insider-name">' + hl(ins.fullname, q) + '</div>';
      if (meta) html += '<div class="insider-meta">' + meta + '</div>';
      html += '</div>';
    });
    html += '</div>';
  });

  content.innerHTML = html;
}
</script>
</body>
</html>
