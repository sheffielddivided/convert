<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Singapore Company Search</title>

<style>
body{
  font-family:system-ui;
  max-width:900px;
  margin:40px auto;
}

input{
  width:350px;
  padding:10px;
}

button{
  padding:10px;
}

.card{
  border:1px solid #ddd;
  border-radius:8px;
  padding:12px;
  margin-top:10px;
}
</style>

</head>

<body>

<h1>Singapore Company Search</h1>

<input
id="query"
placeholder="Search company"
/>

<button id="btn">
Search
</button>

<p id="status"></p>

<div id="results"></div>

<script>

const DATASET =
"d_3f960c10fed6145404ca7b821f263b87";

document
.getElementById("btn")
.addEventListener(
"click",
searchCompanies
);

async function searchCompanies(){

const q =
document
.getElementById("query")
.value
.trim();

if(!q){
status.textContent =
"Enter search text";
return;
}

status.textContent =
"Searching…";

results.innerHTML =
"";

try{

const url =
`https://data.gov.sg/api/action/datastore_search`
+
`?resource_id=${DATASET}`
+
`&limit=10`
+
`&q=${encodeURIComponent(q)}`;

const res =
await fetch(url);

const json =
await res.json();

console.log(json);

const rows =
json?.result?.records
|| [];

status.textContent =
`${rows.length} result(s)`;

for(
const row
of rows
){

const div =
document
.createElement(
"div"
);

div.className =
"card";

div.innerHTML =
`
<strong>
${row.entity_name ?? "-"}
</strong>

<div>
UEN:
${row.uen ?? "-"}
</div>

<div>
Status:
${row.uen_status_desc ?? "-"}
</div>

<div>
Type:
${row.entity_type_desc ?? "-"}
</div>

`;

results.appendChild(
div
);

}

}
catch(err){

console.error(
err
);

status.textContent =
"Request failed";

}

}

</script>

</body>
</html>
