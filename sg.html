<!doctype html>
<html lang="en">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Singapore Company Search</title>

<style>

body{
    font-family:system-ui,sans-serif;
    max-width:900px;
    margin:40px auto;
    padding:20px;
}

.controls{
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:12px;
    font-size:16px;
}

button{
    padding:12px 18px;
}

#status{
    margin-top:16px;
    color:#666;
}

.card{
    border:1px solid #ddd;
    border-radius:8px;
    padding:14px;
    margin-top:12px;
}

.name{
    font-size:18px;
    font-weight:600;
}

.small{
    color:#666;
    margin-top:6px;
}

</style>

</head>

<body>

<h1>Singapore Company Search</h1>

<div class="controls">

<input
id="query"
placeholder="Search company"
/>

<button id="searchBtn">
Search
</button>

</div>

<div id="status"></div>

<div id="results"></div>

<script>

const DATASET =
"d_3f960c10fed6145404ca7b821f263b87";

let resourceId =
null;

async function getResourceId(){

if(resourceId){
return resourceId;
}

const meta =
await fetch(
`https://data.gov.sg/api/action/package_show?id=${DATASET}`
);

const json =
await meta.json();

resourceId =
json
.result
.resources[0]
.id;

return resourceId;

}

async function searchCompanies(){

const query =
document
.getElementById("query")
.value
.trim()
.toLowerCase();

if(!query){

status.textContent =
"Enter search text";

return;

}

status.textContent =
"Searching...";

results.innerHTML =
"";

try{

const id =
await getResourceId();

const url =
`https://data.gov.sg/api/action/datastore_search`
+
`?resource_id=${id}`
+
`&limit=50`
+
`&fields=entity_name,uen,uen_status_desc,entity_type_desc`
+
`&q=${encodeURIComponent(query)}`;

const res =
await fetch(
url
);

const json =
await res.json();

let rows =
json
?.result
?.records
|| [];

rows =
rows
.filter(r =>
(
r.entity_name || ""
)
.toLowerCase()
.includes(
query
)
)
.slice(0,10);

render(
rows
);

status.textContent =
`${rows.length} result(s)`;

}
catch(err){

console.error(
err
);

status.textContent =
"Search failed";

}

}

function render(rows){

results.innerHTML =
"";

if(
rows.length===0
){

results.innerHTML =
"<p>No results</p>";

return;

}

rows.forEach(row=>{

const div =
document
.createElement(
"div"
);

div.className =
"card";

div.innerHTML =
`
<div class="name">
${row.entity_name}
</div>

<div class="small">
UEN:
${row.uen}
</div>

<div class="small">
Status:
${row.uen_status_desc}
</div>

<div class="small">
Type:
${row.entity_type_desc}
</div>
`;

results.appendChild(
div
);

});

}

searchBtn
.addEventListener(
"click",
searchCompanies
);

query
.addEventListener(
"keydown",
e=>{

if(
e.key==="Enter"
){

searchCompanies();

}

});

</script>

</body>
</html>
