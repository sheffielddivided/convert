<!doctype html>
<html>
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Singapore Company Search</title>

<style>

body{
font-family:system-ui;
max-width:1000px;
margin:40px auto;
padding:20px;
}

.controls{
display:flex;
gap:10px;
}

input{
flex:1;
padding:12px;
}

button{
padding:12px 18px;
}

.card{
border:1px solid #ddd;
padding:14px;
margin-top:12px;
border-radius:8px;
cursor:pointer;
}

.card:hover{
background:#fafafa;
}

.details{
margin-top:10px;
padding-top:10px;
border-top:1px solid #eee;
}

.label{
font-weight:600;
}

.small{
color:#666;
}

</style>

</head>

<body>

<h1>Singapore Company Search</h1>

<div class="controls">

<input
id="query"
placeholder="Search company"
/>

<button id="searchBtn">
Search
</button>

</div>

<div id="status"></div>

<div id="results"></div>

<script>

const DATASET =
"d_3f960c10fed6145404ca7b821f263b87";

let current=[];

async function searchCompanies(){

const raw =
query
.value
.trim();

if(!raw){
return;
}

status.textContent =
"Searching...";

results.innerHTML="";

try{

const normalized =
raw
.toLowerCase();

const firstWord =
raw
.split(/\s+/)[0];

const url =
`https://data.gov.sg/api/action/datastore_search`
+
`?resource_id=${DATASET}`
+
`&limit=100`
+
`&q=${encodeURIComponent(firstWord)}`;

const res =
await fetch(url);

const json =
await res.json();

let rows =
json
?.result
?.records
|| [];

rows =
rows
.filter(r=>{

const name =
(
r.entity_name
||
""
)
.toLowerCase();

return (
name.includes(
normalized
)
);

})

.sort((a,b)=>{

const A =
a.entity_name
.toLowerCase();

const B =
b.entity_name
.toLowerCase();

const aStarts =
A.startsWith(
normalized
);

const bStarts =
B.startsWith(
normalized
);

if(
aStarts &&
!bStarts
) return -1;

if(
!aStarts &&
bStarts
) return 1;

return (
A.length -
B.length
);

})

.slice(0,10);

current =
rows;

render();

status.textContent =
`${rows.length} results`;

}
catch(err){

console.error(
err
);

status.textContent =
"Search failed";

}

}
function render(){

results.innerHTML="";

current.forEach((row,i)=>{

const card =
document.createElement(
"div"
);

card.className =
"card";

card.innerHTML=
`
<div>
<b>
${row.entity_name}
</b>
</div>

<div class="small">
UEN:
${row.uen}
</div>

<div class="small">
${row.entity_type_desc||""}
</div>

<div
id="detail-${i}">
</div>
`;

card.onclick=
()=>loadDetails(
row.uen,
i
);

results.appendChild(
card
);

});

}

async function loadDetails(
uen,
index
){

const target =
document.getElementById(
`detail-${index}`
);

target.innerHTML =
"Loading details...";

const url =
`https://data.gov.sg/api/action/datastore_search`
+
`?resource_id=${DATASET}`
+
`&filters=`
+
encodeURIComponent(
JSON.stringify({
uen:uen
})
);

const res =
await fetch(url);

const json =
await res.json();

const row =
json
?.result
?.records?.[0];

if(!row){

target.innerHTML =
"No details";

return;

}

target.innerHTML =
`
<div class="details">

<div>
<span class="label">
Company:
</span>

${row.entity_name||"-"}
</div>

<div>
<span class="label">
UEN:
</span>

${row.uen||"-"}
</div>

<div>
<span class="label">
Status:
</span>

${row.uen_status_desc||"-"}
</div>

<div>
<span class="label">
Entity Type:
</span>

${row.entity_type_desc||"-"}
</div>

<div>
<span class="label">
Registration Date:
</span>

${row.registration_incorporation_date||"-"}
</div>

<div>
<span class="label">
Address:
</span>

${row.primary_ssic_description||"-"}
</div>

</div>
`;

}

searchBtn.onclick =
searchCompanies;

query.addEventListener(
"keydown",
e=>{

if(
e.key==="Enter"
){

searchCompanies();

}

});

</script>

</body>
</html>
