<!doctype html>
<html lang="en">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Singapore Company Search</title>

<style>

body{
    font-family:system-ui,sans-serif;
    max-width:1000px;
    margin:40px auto;
    padding:20px;
}

.controls{
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:12px;
    font-size:16px;
}

button{
    padding:12px 18px;
}

#status{
    margin-top:12px;
    color:#666;
}

.card{
    border:1px solid #ddd;
    border-radius:8px;
    padding:14px;
    margin-top:12px;
    cursor:pointer;
}

.card:hover{
    background:#fafafa;
}

.details{
    margin-top:12px;
    padding-top:12px;
    border-top:1px solid #eee;
}

.label{
    font-weight:600;
}

.small{
    color:#666;
}

</style>

</head>

<body>

<h1>Singapore Company Search</h1>

<div class="controls">

<input
id="query"
placeholder="Search company name"
/>

<button id="searchBtn">
Search
</button>

</div>

<div id="status"></div>

<div id="results"></div>

<script>

let DATASETS = {};

const DATASET =
"d_3f960c10fed6145404ca7b821f263b87";

let current=[];

async function loadCollectionMap(){

const res =
await fetch(
"https://data.gov.sg/api/action/collection_show?id=2"
);

const json =
await res.json();

/*
Strukturen inneholder en liste av datasets
vi må mappe dem til A-Z basert på navn
*/

const items =
json?.result?.datasets || json?.result || [];

for(const ds of items){

const name =
(ds.name || "").toUpperCase();

/*
Eksempler:
"ACRA INFORMATION A"
"ACRA INFORMATION B"
etc
*/

const match =
name.match(/([A-Z]|OTHERS)$/);

if(match){

const key = match[1];

DATASETS[key] =
ds.resource_id;

}

}

console.log("Loaded dataset map:", DATASETS);

}

async function searchCompanies(){

const q =
document
.getElementById("query")
.value
.trim();

if(!q){
return;
}

status.textContent =
"Searching...";

results.innerHTML =
"";

try{

const search =
encodeURIComponent(
JSON.stringify({
entity_name:q
})
);

const url =
`https://data.gov.sg/api/action/datastore_search`
+
`?resource_id=${DATASET}`
+
`&limit=50`
+
`&fields=entity_name,uen,uen_status_desc,entity_type_desc`
+
`&q=${search}`;

const res =
await fetch(url);

if(!res.ok){

throw new Error(
`HTTP ${res.status}`
);

}

const json =
await res.json();

let rows =
json
?.result
?.records
|| [];

rows =
rows
.filter(r=>
(
r.entity_name
||
""
)
.toLowerCase()
.includes(
q.toLowerCase()
)
)

.sort((a,b)=>{

const A =
a.entity_name
.toLowerCase();

const B =
b.entity_name
.toLowerCase();

const qn =
q.toLowerCase();

if(
A.startsWith(qn)
&&
!B.startsWith(qn)
){
return -1;
}

if(
!A.startsWith(qn)
&&
B.startsWith(qn)
){
return 1;
}

return (
A.length
-
B.length
);

})

.slice(0,10);

current =
rows;

render();

status.textContent =
`${rows.length} results`;

}
catch(err){

console.error(
err
);

status.textContent =
"Search failed";

}

}

function render(){

results.innerHTML="";

if(!current.length){

results.innerHTML =
"<p>No results</p>";

return;

}

current.forEach((row,index)=>{

const div =
document.createElement(
"div"
);

div.className =
"card";

div.innerHTML =
`
<div>
<b>${row.entity_name}</b>
</div>

<div class="small">
UEN: ${row.uen}
</div>

<div class="small">
${row.entity_type_desc || "-"}
</div>

<div id="detail-${index}"></div>
`;

div.addEventListener(
"click",
()=>loadDetails(
row.uen,
row.entity_name,
index
),
{
once:true
}
);

results.appendChild(
div
);

});

}

async function loadDetails(
uen,
entityName,
index
){

const target =
document.getElementById(
`detail-${index}`
);

if(!target) return;

if(target.dataset.loaded) return;

target.innerHTML =
"Loading details...";

try{

const first =
(entityName || "")
.trim()
.charAt(0)
.toUpperCase();

const bucket =
/^[A-Z]$/.test(first)
? first
: "others";

const dataset = DATASETS[bucket];

if(!dataset){

target.innerHTML =
`Missing dataset id for bucket: ${bucket}`;

return;

}

const filters =
encodeURIComponent(
JSON.stringify({ uen })
);

const url =
`https://data.gov.sg/api/action/datastore_search`
+ `?resource_id=${dataset}`
+ `&limit=1`
+ `&filters=${filters}`;

const res =
await fetch(url);

if(!res.ok){
throw new Error(`HTTP ${res.status}`);
}

const json =
await res.json();

const row =
json?.result?.records?.[0];

if(!row){
target.innerHTML = "No detailed record";
return;
}

target.dataset.loaded = "1";

const ignore =
new Set(["_id"]);

const html =
Object.entries(row)
.filter(([k]) => !ignore.has(k))
.map(([k,v]) => {

const label =
k.replaceAll("_"," ")
 .replace(/\b\w/g, m => m.toUpperCase());

return `
<div style="margin-bottom:10px;">
  <div style="font-weight:600;">${label}</div>
  <div>${v ?? "-"}</div>
</div>
`;

}).join("");

target.innerHTML =
`<div class="details">${html}</div>`;

}
catch(err){

console.error(err);

target.innerHTML =
"Failed loading details";

}

}

searchBtn
.addEventListener(
"click",
searchCompanies
);

query
.addEventListener(
"keydown",
e=>{

if(
e.key==="Enter"
){

searchCompanies();

}

});

loadCollectionMap();

</script>

</body>

</html>
