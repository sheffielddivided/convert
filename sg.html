<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Singapore Company Search</title>

<style>
  /* ── Tokens ── */
  :root {
    --bg:       #f5f7fa;
    --surface:  #ffffff;
    --border:   #e2e6ec;
    --accent:   #c0392b;        /* Singapore red */
    --accent-d: #96281b;
    --text:     #1a1f2e;
    --muted:    #6b7280;
    --radius:   10px;
    --shadow:   0 1px 4px rgba(0,0,0,.08);
  }

  *, *::before, *::after { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, sans-serif;
    font-size: 15px;
    line-height: 1.6;
  }

  /* ── Header ── */
  header {
    background: var(--accent);
    color: #fff;
    padding: 28px 24px 24px;
  }

  .header-inner {
    max-width: 780px;
    margin: 0 auto;
  }

  .flag-stripe {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
  }

  .flag-stripe span {
    display: block;
    height: 4px;
    width: 32px;
    border-radius: 2px;
    background: rgba(255,255,255,.55);
  }

  .flag-stripe span:first-child { background: #fff; }

  h1 {
    margin: 0 0 4px;
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: -.02em;
  }

  .subtitle {
    margin: 0;
    font-size: .85rem;
    opacity: .8;
  }

  /* ── Search bar ── */
  .search-wrap {
    max-width: 780px;
    margin: 28px auto 0;
    padding: 0 24px;
  }

  .search-row {
    display: flex;
    gap: 10px;
  }

  #query {
    flex: 1;
    padding: 12px 16px;
    font-size: 15px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text);
    outline: none;
    transition: border-color .15s;
  }

  #query:focus { border-color: var(--accent); }

  #searchBtn {
    padding: 12px 22px;
    font-size: 15px;
    font-weight: 600;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background .15s;
  }

  #searchBtn:hover  { background: var(--accent-d); }
  #searchBtn:active { opacity: .85; }
  #searchBtn:disabled { opacity: .5; cursor: default; }

  /* ── Status ── */
  #status {
    max-width: 780px;
    margin: 12px auto 0;
    padding: 0 24px;
    color: var(--muted);
    font-size: .85rem;
    min-height: 1.4em;
  }

  #status.error { color: var(--accent); }

  /* ── Results ── */
  #results {
    max-width: 780px;
    margin: 16px auto 60px;
    padding: 0 24px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* ── Card ── */
  .card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    transition: border-color .15s, box-shadow .15s;
  }

  .card:hover { border-color: var(--accent); box-shadow: 0 2px 10px rgba(0,0,0,.1); }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    padding: 16px 18px;
    cursor: pointer;
    user-select: none;
  }

  .card-header:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: -2px;
  }

  .card-name  { font-weight: 600; font-size: 1rem; }
  .card-meta  { color: var(--muted); font-size: .82rem; margin-top: 2px; }

  .chevron {
    flex-shrink: 0;
    width: 20px;
    height: 20px;
    color: var(--muted);
    transition: transform .2s;
  }

  .card.open .chevron { transform: rotate(180deg); }

  /* ── Detail panel ── */
  .detail-panel {
    display: none;
    border-top: 1.5px solid var(--border);
    padding: 18px;
    background: #fcfcfc;
  }

  .card.open .detail-panel { display: block; }

  /* ── Detail layout: single column, label inline ── */
  .detail-list {
    display: flex;
    flex-direction: column;
  }

  .detail-status {
    text-align: left;
    font-weight: 700;
    font-size: .95rem;
    margin-bottom: 8px;
  }

  .detail-status.live  { color: #16a34a; }
  .detail-status.other { color: var(--accent); }

  .detail-field {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding: 5px 0;
  }

  .detail-field label {
    flex: 0 0 150px;
    font-size: .78rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .05em;
    color: var(--muted);
    white-space: normal;
    word-break: break-word;
  }

  .detail-field .field-value {
    flex: 1;
    font-size: .9rem;
    word-break: break-word;
    user-select: text;
    cursor: text;
  }



  .copy-btn {
    flex-shrink: 0;
    background: none;
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 1px 8px;
    font-size: .72rem;
    color: var(--muted);
    cursor: pointer;
    transition: background .12s, color .12s;
    line-height: 1.6;
  }

  .copy-btn:hover  { background: var(--bg); color: var(--text); }
  .copy-btn.copied { color: #16a34a; border-color: #16a34a; }

  .detail-divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 10px 0;
  }

  /* ── Loading skeleton ── */
  .skeleton {
    background: linear-gradient(90deg, #ececec 25%, #f5f5f5 50%, #ececec 75%);
    background-size: 200% 100%;
    animation: shimmer 1.2s infinite;
    border-radius: 4px;
    height: 14px;
    margin-bottom: 8px;
  }

  .skeleton.short { width: 45%; }

  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* ── Empty / error states ── */
  .state-msg {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
  }

  .state-msg b { display: block; font-size: 1.1rem; color: var(--text); margin-bottom: 6px; }

  /* ── Responsive ── */
  @media (max-width: 520px) {
    h1 { font-size: 1.3rem; }
    .search-row { flex-direction: column; }
    #searchBtn { width: 100%; }
    .detail-grid { grid-template-columns: 1fr; }
  }

  @media (prefers-reduced-motion: reduce) {
    .chevron, .card, #searchBtn, #query { transition: none; }
    .skeleton { animation: none; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="flag-stripe"><span></span><span></span><span></span><span></span></div>
    <h1>Singapore Company Search</h1>
    <p class="subtitle">Search registered entities via data.gov.sg</p>
  </div>
</header>

<div class="search-wrap">
  <div class="search-row">
    <input
      id="query"
      type="search"
      placeholder="Company name…"
      autocomplete="off"
      spellcheck="false"
      aria-label="Search company name"
    />
    <button id="searchBtn" aria-label="Search">Search</button>
  </div>
</div>

<div id="status" role="status" aria-live="polite"></div>
<div id="results" aria-live="polite"></div>

<script>
/* ──────────────────────────────────────────
   CONFIG
────────────────────────────────────────── */
const SEARCH_DATASET   = "d_3f960c10fed6145404ca7b821f263b87";
const BASE             = "https://data.gov.sg/api/action/datastore_search";
const COLLECTION_META  = "https://api-production.data.gov.sg/v2/public/api/collections/2/metadata?withDatasetMetadata=true";

// Cache: letter → datasetId, populated lazily on first detail lookup
let letterDatasetMap = null;

/* ──────────────────────────────────────────
   DOM REFS
────────────────────────────────────────── */
const queryEl  = document.getElementById("query");
const searchBtn = document.getElementById("searchBtn");
const statusEl  = document.getElementById("status");
const resultsEl = document.getElementById("results");

/* ──────────────────────────────────────────
   DEBOUNCE
────────────────────────────────────────── */
function debounce(fn, ms) {
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}

/* ──────────────────────────────────────────
   API HELPERS
────────────────────────────────────────── */
async function apiFetch(resourceId, params) {
  const qs = new URLSearchParams({ resource_id: resourceId, ...params });
  const res = await fetch(`${BASE}?${qs}`);

  if (!res.ok) {
    throw new Error(`HTTP ${res.status} – ${res.statusText}`);
  }

  const json = await res.json();

  if (!json.success) {
    throw new Error("API returned success:false");
  }

  return json.result;
}

/* ──────────────────────────────────────────
   SEARCH
────────────────────────────────────────── */
async function searchCompanies() {
  const q = queryEl.value.trim();
  if (!q) return;

  setStatus("Searching…");
  resultsEl.innerHTML = "";
  searchBtn.disabled = true;

  try {
    const result = await apiFetch(SEARCH_DATASET, {
      limit: 10,
      q: JSON.stringify({ entity_name: q })
    });

    const rows = (result.records || []);

    if (!rows.length) {
      resultsEl.innerHTML = `
        <div class="state-msg">
          <b>No results</b>
          Try a different name or partial name.
        </div>`;
      setStatus("");
      return;
    }

    renderCards(rows);
    setStatus(`${rows.length} result${rows.length !== 1 ? "s" : ""}`);

  } catch (err) {
    console.error(err);
    setStatus("Search failed. Please try again.", true);
  } finally {
    searchBtn.disabled = false;
  }
}

/* ──────────────────────────────────────────
   RENDER CARDS
────────────────────────────────────────── */
function renderCards(rows) {
  resultsEl.innerHTML = "";

  rows.forEach((row) => {
    const card = document.createElement("div");
    card.className = "card";

    const header = document.createElement("div");
    header.className = "card-header";
    header.setAttribute("tabindex", "0");
    header.setAttribute("role", "button");
    header.setAttribute("aria-expanded", "false");

    header.innerHTML = `
      <div>
        <div class="card-name">${escHtml(row.entity_name ?? "–")}</div>
        <div class="card-meta">
          UEN: ${escHtml(row.uen ?? "–")}
          ${row.entity_type_desc ? ` · ${escHtml(row.entity_type_desc)}` : ""}
        </div>
      </div>
      <svg class="chevron" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <polyline points="5 8 10 13 15 8"/>
      </svg>
    `;

    const panel = document.createElement("div");
    panel.className = "detail-panel";

    let loaded = false;

    function toggle() {
      const isOpen = card.classList.toggle("open");
      header.setAttribute("aria-expanded", isOpen);

      if (isOpen && !loaded) {
        loaded = true;
        loadDetails(row.uen, row.entity_name ?? "", panel);
      }
    }

    header.addEventListener("click", toggle);
    header.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") { e.preventDefault(); toggle(); }
    });

    card.appendChild(header);
    card.appendChild(panel);
    resultsEl.appendChild(card);
  });
}

/* ──────────────────────────────────────────
   FORMAT RECORD
   Merges address fields into one, drops na values
────────────────────────────────────────── */
function formatRecord(row) {
  // Address fields to consume
  const addressFields = [
    "block", "street_name",
    "level_no", "unit_no",
    "building_name", "postal_code",
    // search dataset variants
    "reg_street_name", "reg_postal_code",
    // other_address fallback
    "other_address_line1", "other_address_line2",
    "address_type"
  ];

  const notNA = (v) => v && String(v).trim().toLowerCase() !== "na";

  // Build formatted address string
  // Format: [Block] [Street] #[Level]-[Unit] [Building] Singapore [Postal]
  const parts = [];

  const block    = notNA(row.block)         ? row.block         : null;
  const street   = notNA(row.street_name)   ? row.street_name
                 : notNA(row.reg_street_name) ? row.reg_street_name : null;
  const level    = notNA(row.level_no)      ? row.level_no      : null;
  const unit     = notNA(row.unit_no)       ? row.unit_no       : null;
  const building = notNA(row.building_name) ? row.building_name : null;
  const postal   = notNA(row.postal_code)   ? row.postal_code
                 : notNA(row.reg_postal_code) ? row.reg_postal_code : null;

  if (block)  parts.push(block);
  if (street) parts.push(street);

  if (level && unit)  parts.push(`#${level}-${unit}`);
  else if (level)     parts.push(`#${level}`);
  else if (unit)      parts.push(`#${unit}`);

  if (building) parts.push(building);

  // Fallback: other_address lines
  const otherLine1 = notNA(row.other_address_line1) ? row.other_address_line1 : null;
  const otherLine2 = notNA(row.other_address_line2) ? row.other_address_line2 : null;

  const addressStr = parts.length > 0
    ? parts.join(" ")
    : [otherLine1, otherLine2].filter(Boolean).join(", ");

  // Build output record: omit consumed address fields, inject merged address
  const out = {};
  for (const [k, v] of Object.entries(row)) {
    if (addressFields.includes(k)) continue;
    out[k] = v;
  }

  // Inject address after entity_name if present, else at start
  const result = {};
  for (const [k, v] of Object.entries(out)) {
    result[k] = v;
    if (k === "entity_name" || k === "entity_type_desc") {
      // keep going, insert address after these key fields
    }
  }

  // Insert address and expose postal as internal field
  if (addressStr.trim() !== "Singapore") {
    out["address"] = addressStr;
  }
  if (postal) {
    out["_postal"] = postal;
  }

  return out;
}


/* ──────────────────────────────────────────
   FIELD ROW HELPER
────────────────────────────────────────── */
function fieldRow(label, value, withCopy) {
  const v = String(value);
  const div = document.createElement("div");
  div.className = "detail-field";

  const lbl = document.createElement("label");
  lbl.textContent = label;
  div.appendChild(lbl);

  const valSpan = document.createElement("span");
  valSpan.className = "field-value";
  valSpan.textContent = v;
  div.appendChild(valSpan);

  if (withCopy) {
    valSpan.draggable = true;
    valSpan.style.cursor = "grab";
    valSpan.style.userSelect = "none";
    valSpan.addEventListener("dragstart", e => {
      e.dataTransfer.effectAllowed = "copy";
      e.dataTransfer.setData("text/plain", v);
    });
    valSpan.addEventListener("dragend", () => {
      valSpan.style.opacity = "";
    });
    valSpan.addEventListener("mousedown", () => {
      valSpan.style.opacity = "0.6";
    });
    valSpan.addEventListener("mouseup", () => {
      valSpan.style.opacity = "";
    });

    const btn = document.createElement("button");
    btn.className = "copy-btn";
    btn.textContent = "Copy";
    btn.addEventListener("click", () => {
      function markCopied() {
        btn.textContent = "Copied!";
        btn.classList.add("copied");
        setTimeout(() => { btn.textContent = "Copy"; btn.classList.remove("copied"); }, 1500);
      }
      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(v).then(markCopied).catch(() => fallbackCopy(v, markCopied));
      } else {
        fallbackCopy(v, markCopied);
      }
    });
    div.appendChild(btn);
  }

  return div;
}

async function loadDetails(uen, entityName, panel) {
  panel.innerHTML = `
    <div style="padding:4px 0">
      <div class="skeleton"></div>
      <div class="skeleton short"></div>
      <div class="skeleton"></div>
    </div>`;

  try {
    // Resolve which letter-dataset to use based on entity name
    const detailDatasetId = await resolveDetailDataset(entityName);

    let row = detailDatasetId
      ? await fetchDetailRow(detailDatasetId, uen)
      : null;

    // Fallback: search dataset (fewer fields, but full coverage)
    if (!row) {
      row = await fetchDetailRow(SEARCH_DATASET, uen);
    }

    if (!row) {
      panel.innerHTML = `<div class="state-msg" style="padding:20px">No additional details found.</div>`;
      return;
    }

    const formatted = formatRecord(row);

    const notNA = (v) => v !== null && v !== undefined && v !== "" && String(v).trim().toLowerCase() !== "na";

    // ── Status badge (top, no label) ──
    const statusVal = row.entity_status_description ?? row.uen_status_desc ?? "";
    const isLive    = statusVal.toLowerCase().includes("live");
    const statusHtml = notNA(statusVal)
      ? `<div class="detail-status ${isLive ? "live" : "other"}">${escHtml(statusVal)}</div>`
      : "";

    // ── Key fields (with copy buttons) ──
    const postal = formatted._postal ?? "";
    const keyFields = [
      { label: "UEN",          value: row.uen               ?? "" },
      { label: "Entity Name",  value: row.entity_name        ?? "" },
      { label: "Address",      value: formatted.address      ?? "" },
      { label: "Postal Code",  value: postal                       },
      { label: "City",         value: "Singapore"                  },
    ].filter(f => notNA(f.value));

    // keyFields rendered directly below

    // ── Skip fields shown above or consumed into address ──
    const skipKeys = new Set([
      "_id", "uen", "entity_name", "address", "_postal",
      "entity_status_description", "uen_status_desc",
      "entity_status_desc"
    ]);

    const restHtml = Object.entries(formatted)
      .filter(([k]) => !skipKeys.has(k))
      .filter(([, v]) => notNA(v))
      .map(([k, v]) => fieldRow(humanLabel(k), v, false));

    const list = document.createElement("div");
    list.className = "detail-list";

    if (statusHtml) {
      const s = document.createElement("div");
      s.innerHTML = statusHtml;
      list.appendChild(s.firstChild);
    }

    keyFields.forEach(f => list.appendChild(fieldRow(f.label, f.value, true)));

    if (restHtml.length) {
      const hr = document.createElement("hr");
      hr.className = "detail-divider";
      list.appendChild(hr);
      restHtml.forEach(el => list.appendChild(el));
    }

    panel.innerHTML = "";
    panel.appendChild(list);

  } catch (err) {
    console.error(err);
    panel.innerHTML = `<div class="state-msg" style="padding:20px">Failed to load details. Try again later.</div>`;
  }
}

/* ──────────────────────────────────────────
   RESOLVE LETTER DATASET
   Fetches collection 2 metadata once, then
   maps first letter → datasetId
────────────────────────────────────────── */
async function resolveDetailDataset(entityName) {
  if (!letterDatasetMap) {
    letterDatasetMap = await buildLetterDatasetMap();
  }

  const firstLetter = (entityName || "").trim()[0]?.toUpperCase() ?? "";
  const isLetter = /^[A-Z]$/.test(firstLetter);
  const key = isLetter ? firstLetter : "others";

  return letterDatasetMap[key] ?? null;
}

async function buildLetterDatasetMap() {
  const res = await fetch(COLLECTION_META);

  if (!res.ok) throw new Error(`Collection metadata HTTP ${res.status}`);

  const json = await res.json();
  const datasets = json?.data?.datasetMetadata ?? [];

  // Dataset names are like "ACRA Information on Corporate Entities ('N')"
  // or "ACRA Information on Corporate Entities (others)"
  const map = {};

  for (const ds of datasets) {
    const match = ds.name?.match(/\('([A-Z])'\)/) || ds.name?.match(/\(others\)/i);
    if (!match) continue;
    const key = match[1] ?? "others";
    map[key] = ds.datasetId;
  }

  return map;
}

async function fetchDetailRow(resourceId, uen) {
  const result = await apiFetch(resourceId, {
    limit: 1,
    filters: JSON.stringify({ uen })
  });
  return result.records?.[0] ?? null;
}

/* ──────────────────────────────────────────
   UTILS
────────────────────────────────────────── */
function humanLabel(key) {
  return key
    .replaceAll("_", " ")
    .replace(/\b\w/g, (m) => m.toUpperCase());
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function setStatus(msg, isError = false) {
  statusEl.textContent = msg;
  statusEl.className = isError ? "error" : "";
}

/* ──────────────────────────────────────────
   COPY HELPER
────────────────────────────────────────── */
function fallbackCopy(text, cb) {
  const ta = document.createElement("textarea");
  ta.value = text;
  ta.style.cssText = "position:fixed;left:-9999px;top:0;opacity:0";
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  const ok = document.execCommand("copy");
  document.body.removeChild(ta);
  if (ok && cb) cb();
}

/* ──────────────────────────────────────────
   EVENTS
────────────────────────────────────────── */
const debouncedSearch = debounce(searchCompanies, 300);

searchBtn.addEventListener("click", searchCompanies);
queryEl.addEventListener("keydown", (e) => {
  if (e.key === "Enter") searchCompanies();
});

// URL param: ?q=searchterm  →  run search on load
const urlQ = new URLSearchParams(window.location.search).get("q");
if (urlQ) {
  queryEl.value = urlQ;
  searchCompanies();
}
</script>

</body>
</html>
