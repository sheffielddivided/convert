<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Singapore Company Search</title>

<style>
body{
    font-family:system-ui;
    max-width:900px;
    margin:40px auto;
    padding:20px;
}

input{
    width:350px;
    padding:10px;
}

button{
    padding:10px 16px;
}

.card{
    border:1px solid #ddd;
    padding:12px;
    border-radius:8px;
    margin-top:12px;
}

.small{
    color:#666;
}
</style>
</head>

<body>

<h1>Singapore Company Search</h1>

<input
id="query"
placeholder="Company name"
/>

<button onclick="searchCompanies()">
Search
</button>

<p id="status"></p>

<div id="results"></div>

<script>

const DATASET =
"d_3f960c10fed6145404ca7b821f263b87";

async function searchCompanies(){

const q =
document
.getElementById("query")
.value
.trim();

if(!q){
return;
}

status.textContent =
"Searching...";

results.innerHTML =
"";

try{

const url =
`https://api-open.data.gov.sg/v1/public/api/datasets/${DATASET}/poll-download`;

const response =
await fetch(url);

if(!response.ok){
throw new Error(
"API failed"
);
}

const json =
await response.json();

const rows =
json?.data?.records || [];

const matches =
rows
.filter(r =>
(
r.entity_name || ""
)
.toLowerCase()
.includes(
q.toLowerCase()
)
)
.slice(0,10);

status.textContent =
`${matches.length} results`;

for(const row of matches){

const div =
document.createElement(
"div"
);

div.className =
"card";

div.innerHTML =
`
<h3>
${row.entity_name || "-"}
</h3>

<div class="small">
UEN:
${row.uen || "-"}
</div>

<div class="small">
Status:
${row.uen_status_desc || "-"}
</div>

<div class="small">
Type:
${row.entity_type_desc || "-"}
</div>
`;

results.appendChild(
div
);

}

}
catch(err){

console.error(err);

status.textContent =
err.message;

}

}

</script>

</body>
</html>
