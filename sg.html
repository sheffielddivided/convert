<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Singapore Company Search (Stable)</title>

<style>
body{
    font-family:system-ui,sans-serif;
    max-width:1000px;
    margin:40px auto;
    padding:20px;
}

.controls{
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:12px;
    font-size:16px;
}

button{
    padding:12px 18px;
}

#status{
    margin-top:12px;
    color:#666;
}

.card{
    border:1px solid #ddd;
    border-radius:8px;
    padding:14px;
    margin-top:12px;
    cursor:pointer;
}

.card:hover{
    background:#fafafa;
}

.details{
    margin-top:12px;
    padding-top:12px;
    border-top:1px solid #eee;
}

.small{ color:#666; }
</style>
</head>

<body>

<h1>Singapore Company Search</h1>

<div class="controls">
<input id="query" placeholder="Search company name"/>
<button id="searchBtn">Search</button>
</div>

<div id="status"></div>
<div id="results"></div>

<script>

/*
========================================================
CONFIG
========================================================
*/
const SEARCH_DATASET =
"d_3f960c10fed6145404ca7b821f263b87";

const DETAIL_DATASET =
"d_8575e84912df3c28995b8e6e0e05205a";

/*
========================================================
STATE
========================================================
*/
let current = [];

/*
========================================================
SEARCH (LIMIT 10 enforced server-side)
========================================================
*/
async function searchCompanies(){

const q =
document.getElementById("query").value.trim();

if(!q) return;

status.textContent = "Searching...";
results.innerHTML = "";

try{

const search =
encodeURIComponent(JSON.stringify({
entity_name: q
}));

const url =
`https://data.gov.sg/api/action/datastore_search`
+ `?resource_id=${SEARCH_DATASET}`
+ `&limit=10`
+ `&q=${search}`;

const res = await fetch(url);
const json = await res.json();

let rows = json?.result?.records || [];

rows = rows.filter(r =>
(r.entity_name || "")
.toLowerCase()
.includes(q.toLowerCase())
);

current = rows;

render();

status.textContent =
`${rows.length} results`;

}
catch(err){
console.error(err);
status.textContent = "Search failed";
}

}

/*
========================================================
RENDER LIST
========================================================
*/
function render(){

results.innerHTML = "";

if(!current.length){
results.innerHTML = "<p>No results</p>";
return;
}

current.forEach((row,index)=>{

const div = document.createElement("div");
div.className = "card";

div.innerHTML = `
<div><b>${row.entity_name}</b></div>
<div class="small">UEN: ${row.uen}</div>
<div class="small">${row.entity_type_desc || "-"}</div>
<div id="detail-${index}"></div>
`;

div.addEventListener("click",()=>{
loadDetails(row.uen,index);
},{once:true});

results.appendChild(div);

});

}

/*
========================================================
DETAIL LOOKUP (NO A-Z LOGIC, SINGLE SOURCE OF TRUTH)
========================================================
*/
async function loadDetails(uen,index){

const target =
document.getElementById(`detail-${index}`);

if(!target) return;
if(target.dataset.loaded) return;

target.innerHTML = "Loading details...";

try{

const filters =
encodeURIComponent(JSON.stringify({ uen }));

const url =
`https://data.gov.sg/api/action/datastore_search`
+ `?resource_id=${DETAIL_DATASET}`
+ `&limit=1`
+ `&filters=${filters}`;

const res = await fetch(url);
const json = await res.json();

let row = json?.result?.records?.[0];

/*
========================================================
FALLBACK (important for dataset coverage gaps)
========================================================
*/
if(!row){

const fallbackUrl =
`https://data.gov.sg/api/action/datastore_search`
+ `?resource_id=${SEARCH_DATASET}`
+ `&limit=1`
+ `&filters=${filters}`;

const fallbackRes = await fetch(fallbackUrl);
const fallbackJson = await fallbackRes.json();

row = fallbackJson?.result?.records?.[0];
}

if(!row){
target.innerHTML = "No detailed record";
return;
}

target.dataset.loaded = "1";

/*
========================================================
AUTO RENDER ALL FIELDS (future-proof)
========================================================
*/
const html =
Object.entries(row)
.filter(([k]) => k !== "_id")
.map(([k,v]) => {

const label =
k.replaceAll("_"," ")
 .replace(/\b\w/g,m=>m.toUpperCase());

return `
<div style="margin-bottom:8px">
<b>${label}</b><br>
${v ?? "-"}
</div>
`;

}).join("");

target.innerHTML =
`<div class="details">${html}</div>`;

}
catch(err){
console.error(err);
target.innerHTML = "Failed loading details";
}

}

/*
========================================================
EVENTS
========================================================
*/
searchBtn.addEventListener("click",searchCompanies);

query.addEventListener("keydown",e=>{
if(e.key==="Enter") searchCompanies();
});

</script>

</body>
</html>
