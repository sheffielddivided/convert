<!doctype html>
<html lang="en">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Singapore Company Search</title>

<style>

body{
    font-family:system-ui,sans-serif;
    max-width:1000px;
    margin:40px auto;
    padding:20px;
}

.controls{
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:12px;
    font-size:16px;
}

button{
    padding:12px 18px;
}

#status{
    margin-top:12px;
    color:#666;
}

.card{
    border:1px solid #ddd;
    border-radius:8px;
    padding:14px;
    margin-top:12px;
    cursor:pointer;
}

.card:hover{
    background:#fafafa;
}

.details{
    margin-top:12px;
    padding-top:12px;
    border-top:1px solid #eee;
}

.label{
    font-weight:600;
}

.small{
    color:#666;
}

</style>

</head>

<body>

<h1>Singapore Company Search</h1>

<div class="controls">

<input
id="query"
placeholder="Search company name"
/>

<button id="searchBtn">
Search
</button>

</div>

<div id="status"></div>

<div id="results"></div>

<script>

const DATASET =
"d_3f960c10fed6145404ca7b821f263b87";

let current=[];

async function searchCompanies(){

const q =
document
.getElementById("query")
.value
.trim();

if(!q){
return;
}

status.textContent =
"Searching...";

results.innerHTML =
"";

try{

const search =
encodeURIComponent(
JSON.stringify({
entity_name:q
})
);

const url =
`https://data.gov.sg/api/action/datastore_search`
+
`?resource_id=${DATASET}`
+
`&limit=50`
+
`&fields=entity_name,uen,uen_status_desc,entity_type_desc`
+
`&q=${search}`;

const res =
await fetch(url);

if(!res.ok){

throw new Error(
`HTTP ${res.status}`
);

}

const json =
await res.json();

let rows =
json
?.result
?.records
|| [];

rows =
rows
.filter(r=>
(
r.entity_name
||
""
)
.toLowerCase()
.includes(
q.toLowerCase()
)
)

.sort((a,b)=>{

const A =
a.entity_name
.toLowerCase();

const B =
b.entity_name
.toLowerCase();

const qn =
q.toLowerCase();

if(
A.startsWith(qn)
&&
!B.startsWith(qn)
){
return -1;
}

if(
!A.startsWith(qn)
&&
B.startsWith(qn)
){
return 1;
}

return (
A.length
-
B.length
);

})

.slice(0,10);

current =
rows;

render();

status.textContent =
`${rows.length} results`;

}
catch(err){

console.error(
err
);

status.textContent =
"Search failed";

}

}

function render(){

results.innerHTML =
"";

if(
!current.length
){

results.innerHTML =
"<p>No results</p>";

return;

}

current.forEach(
(row,index)=>{

const div =
document.createElement(
"div"
);

div.className =
"card";

div.innerHTML =
`
<div>
<b>
${row.entity_name}
</b>
</div>

<div class="small">
UEN:
${row.uen}
</div>

<div class="small">
${row.entity_type_desc||"-"}
</div>

<div
id="detail-${index}">
</div>
`;

div.onclick =
()=>loadDetails(
row.uen,
index
);

results.appendChild(
div
);

});

}

async function loadDetails(
uen,
index
){

const target =
document.getElementById(
`detail-${index}`
);

if(
target.dataset.loaded
){
return;
}

target.innerHTML =
"Loading...";

try{

const filters =
encodeURIComponent(
JSON.stringify({
uen
})
);

const url =
`https://data.gov.sg/api/action/datastore_search`
+
`?resource_id=${DATASET}`
+
`&limit=1`
+
`&filters=${filters}`;

const res =
await fetch(url);

const json =
await res.json();

const row =
json
?.result
?.records?.[0];

if(!row){

target.innerHTML =
"No details";

return;

}

target.dataset.loaded =
"1";

function show(v){

return (
v &&
String(v)
.trim()
)
? v
: "-";

}

target.innerHTML =
`
<div class="details">

<div>
<b>
${show(
row.entity_name
)}
</b>
</div>

<br>

<div>
<span class="label">
UEN:
</span>

${show(
row.uen
)}
</div>

<div>
<span class="label">
Agency:
</span>

${show(
row.issuance_agency_desc
)}
</div>

<div>
<span class="label">
Status:
</span>

${show(
row.uen_status_desc
)}
</div>

<div>
<span class="label">
Entity Type:
</span>

${show(
row.entity_type_desc
)}
</div>

<div>
<span class="label">
Registration Date:
</span>

${show(
row.uen_issue_date
)}
</div>

<div>
<span class="label">
Registered Address:
</span>

${show(
row.reg_street_name
)}
</div>

<div>
<span class="label">
Postal Code:
</span>

${show(
row.reg_postal_code
)}
</div>

</div>
`;

}
catch(err){

console.error(
err
);

target.innerHTML =
"Failed to load details";

}

}

searchBtn
.addEventListener(
"click",
searchCompanies
);

query
.addEventListener(
"keydown",
e=>{

if(
e.key==="Enter"
){

searchCompanies();

}

});

</script>

</body>

</html>
