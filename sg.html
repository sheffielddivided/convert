<!doctype html>
<html lang="en">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Singapore Company Search</title>

<style>

body{
    font-family:system-ui,sans-serif;
    max-width:900px;
    margin:40px auto;
    padding:20px;
}

.controls{
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:12px;
    font-size:16px;
}

button{
    padding:12px 18px;
}

.card{
    border:1px solid #ddd;
    border-radius:8px;
    padding:14px;
    margin-top:12px;
}

.small{
    color:#666;
    margin-top:4px;
}

#status{
    margin-top:12px;
}

</style>

</head>

<body>

<h1>Singapore Company Search</h1>

<div class="controls">

<input
id="query"
placeholder="Search company"
/>

<button id="searchBtn">
Search
</button>

</div>

<div id="status"></div>

<div id="results"></div>

<script>

const RESOURCE_ID =
"76724ea4261ebdddaeeddee70f9c64d9";

async function searchCompanies(){

const q =
document
.getElementById("query")
.value
.trim();

if(!q){

status.textContent =
"Enter company name";

return;

}

status.textContent =
"Searching…";

results.innerHTML =
"";

try{

const url =
`https://data.gov.sg/api/action/datastore_search`
+
`?resource_id=${RESOURCE_ID}`
+
`&limit=50`
+
`&q=${encodeURIComponent(q)}`;

const res =
await fetch(
url
);

if(!res.ok){

throw new Error(
`HTTP ${res.status}`
);

}

const json =
await res.json();

let rows =
json
?.result
?.records
|| [];

rows =
rows
.filter(r =>
(
r.entity_name || ""
)
.toLowerCase()
.includes(
q.toLowerCase()
)
)
.slice(0,10);

render(
rows
);

status.textContent =
`${rows.length} result(s)`;

}
catch(err){

console.error(
err
);

status.textContent =
err.message;

}

}

function render(rows){

results.innerHTML =
"";

if(
rows.length===0
){

results.innerHTML =
"<p>No results</p>";

return;

}

for(
const row
of rows
){

const card =
document
.createElement(
"div"
);

card.className =
"card";

card.innerHTML =
`
<h3>
${row.entity_name || "-"}
</h3>

<div class="small">
UEN:
${row.uen || "-"}
</div>

<div class="small">
Status:
${row.uen_status_desc || "-"}
</div>

<div class="small">
Type:
${row.entity_type_desc || "-"}
</div>
`;

results.appendChild(
card
);

}

}

document
.getElementById(
"searchBtn"
)
.addEventListener(
"click",
searchCompanies
);

document
.getElementById(
"query"
)
.addEventListener(
"keydown",
e=>{

if(
e.key==="Enter"
){

searchCompanies();

}

});

</script>

</body>
</html>
