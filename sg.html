<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Singapore selskapsregister</title>

<style>
body{
    font-family:system-ui,sans-serif;
    max-width:900px;
    margin:40px auto;
    padding:16px;
}

input{
    width:360px;
    padding:10px;
}

button{
    padding:10px 16px;
}

.card{
    border:1px solid #ddd;
    border-radius:8px;
    padding:14px;
    margin-top:12px;
}

.small{
    color:#666;
}
</style>
</head>

<body>

<h1>Singapore Company Search</h1>

<input
    id="query"
    placeholder="Skriv selskapsnavn"
/>

<button onclick="searchCompanies()">
Søk
</button>

<p id="status"></p>

<div id="results"></div>

<script>

const DATASET =
"d_3f960c10fed6145404ca7b821f263b87";

async function searchCompanies(){

const q =
document
.getElementById("query")
.value
.trim();

if(!q){
return;
}

status.textContent =
"Søker...";

results.innerHTML =
"";

try{

const body = {
columnNames:[
"uen",
"entity_name",
"uen_status_desc",
"entity_type_desc"
],
filters:[
{
columnName:"entity_name",
type:"ILIKE",
value:q
}
]
};

const init =
await fetch(
`https://api-open.data.gov.sg/v1/public/api/datasets/${DATASET}/initiate-download`,
{
method:"GET",
headers:{
"Content-Type":"application/json"
}
}
);

if(!init.ok){
throw new Error(
"Kunne ikke starte søk"
);
}

const poll =
await fetch(
`https://api-open.data.gov.sg/v1/public/api/datasets/${DATASET}/poll-download`,
{
method:"GET"
}
);

const meta =
await poll.json();

if(
!meta.data?.url
){
throw new Error(
"Ingen data"
);
}

const csv =
await fetch(
meta.data.url
);

const text =
await csv.text();

const rows =
text
.split("\n")
.slice(1)
.filter(Boolean)
.filter(
r =>
r
.toLowerCase()
.includes(
q.toLowerCase()
)
)
.slice(0,10);

status.textContent =
`${rows.length} treff`;

rows.forEach(r=>{

const c =
r.split(",");

const el =
document
.createElement(
"div"
);

el.className =
"card";

el.innerHTML = `
<h3>${c[1]||"-"}</h3>
<div class="small">
UEN: ${c[0]||"-"}
</div>

<div class="small">
Status:
${c[2]||"-"}
</div>

<div class="small">
Type:
${c[3]||"-"}
</div>
`;

results.appendChild(el);

});

}
catch(err){

console.error(err);

status.textContent =
"Feil ved søk";

}

}

</script>

</body>
</html>
