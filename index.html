  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f1eb;
      --surface: #ffffff;
      --accent: #ac145a;
      --accent-light: #f5e6ee;
      --text: #1a1a1a;
      --muted: #6b6b6b;
      --border: #d8d2c8;
      --tab-inactive: #e8e3da;
      --radius: 12px;
      --mono: 'DM Mono', monospace;
      --display: 'Lato', sans-serif;
    }

    body {
      font-family: var(--mono);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 32px;
    }

    /* Header */
    header {
      background: #000000;
      padding: 14px 16px 0;
      display: flex;
      flex-direction: column;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-app-label {
      font-family: var(--display);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      padding-left: 10px;
      border-left: 1px solid rgba(255,255,255,0.15);
    }

    /* Tab bar */
    .tabs {
      display: flex;
      gap: 0;
    }

    .tab-btn {
      flex: 1;
      padding: 14px 0;
      border: none;
      background: var(--tab-inactive);
      font-family: var(--display);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      border-radius: 10px 10px 0 0;
      transition: all 0.2s ease;
      position: relative;
    }

    .tab-btn:first-child { margin-right: 3px; }

    .tab-btn.active {
      background: var(--bg);
      color: var(--accent);
    }

    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: var(--accent);
      border-radius: 3px 3px 0 0;
    }

    /* Panels */
    .panel {
      display: none;
      padding: 24px 16px;
      animation: fadeIn 0.2s ease;
    }

    .panel.active { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Section label */
    .section-label {
      font-family: var(--display);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
      margin-top: 24px;
    }

    .section-label:first-of-type { margin-top: 0; }

    /* Field rows */
    .field {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      transition: border-color 0.15s;
    }

    .field:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-light);
    }

    .field label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .field input {
      border: none;
      outline: none;
      background: transparent;
      font-family: var(--mono);
      font-size: 22px;
      font-weight: 500;
      color: var(--text);
      width: 100%;
      -moz-appearance: textfield;
    }

    .field input::-webkit-outer-spin-button,
    .field input::-webkit-inner-spin-button { -webkit-appearance: none; }

    .field input::placeholder { color: #c8c3ba; }

    .field .unit-tag {
      font-size: 11px;
      color: var(--accent);
      font-weight: 500;
      letter-spacing: 0.08em;
    }

    /* Currency section */
    .currency-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    /* FX status */
    .fx-status {
      font-size: 11px;
      color: var(--muted);
      margin-top: 8px;
      text-align: right;
      letter-spacing: 0.03em;
    }

    .fx-status.loaded { color: #2a9d5c; }
    .fx-status.error  { color: #c0392b; }

    /* Divider */
    .divider {
      border: none;
      border-top: 1.5px dashed var(--border);
      margin: 20px 0 4px;
    }
  </style>
</head>

  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('price')">Price</button>
    <button class="tab-btn" onclick="switchTab('energy')">Energy</button>
  </div>
</header>

<!-- PRICE PANEL -->
<div id="panel-price" class="panel active">

  <p class="section-label">Enter a value in any field</p>

  <div class="field">
    <label>USD per barrel oil equivalent</label>
    <input id="inputUSDboe" type="number" inputmode="decimal" placeholder="0.00"
      oninput="priceConverter(this.id,this.value)" onchange="priceConverter(this.id,this.value)">
    <span class="unit-tag">USD / boe</span>
  </div>

  <div class="field">
    <label>USD per MMBTU</label>
    <input id="inputUSDmmbtu" type="number" inputmode="decimal" placeholder="0.00"
      oninput="priceConverter(this.id,this.value)" onchange="priceConverter(this.id,this.value)">
    <span class="unit-tag">USD / MMBTU</span>
  </div>

  <div class="field">
    <label>EUR per MWh</label>
    <input id="inputEURmwh" type="number" inputmode="decimal" placeholder="0.00"
      oninput="priceConverter(this.id,this.value)" onchange="priceConverter(this.id,this.value)">
    <span class="unit-tag">EUR / MWh</span>
  </div>

  <div class="field">
    <label>GB pence per therm</label>
    <input id="inputGBPtherm" type="number" inputmode="decimal" placeholder="0.00"
      oninput="priceConverter(this.id,this.value)" onchange="priceConverter(this.id,this.value)">
    <span class="unit-tag">p / th</span>
  </div>

  <hr class="divider">
  <p class="section-label">Currency rates</p>

  <div class="currency-grid">
    <div class="field">
      <label>EUR / USD</label>
      <input id="inputEURUSD" type="number" inputmode="decimal" value="1.1"
        oninput="priceConverter(this.id,this.value)" onchange="priceConverter(this.id,this.value)">
    </div>
    <div class="field">
      <label>GBP / USD</label>
      <input id="inputGBPUSD" type="number" inputmode="decimal" value="1.3"
        oninput="priceConverter(this.id,this.value)" onchange="priceConverter(this.id,this.value)">
    </div>
  </div>
  <p class="fx-status" id="fxStatus">Fetching live rates…</p>

</div>

<!-- ENERGY PANEL -->
<div id="panel-energy" class="panel">

  <p class="section-label">Enter a value in any field</p>

  <div class="field">
    <label>Barrels oil equivalent</label>
    <input id="inputBoe" type="number" inputmode="decimal" placeholder="0.00"
      oninput="weightConverter(this.id,this.value)" onchange="weightConverter(this.id,this.value)">
    <span class="unit-tag">boe</span>
  </div>

  <div class="field">
    <label>Standard cubic metres natural gas</label>
    <input id="inputSM3" type="number" inputmode="decimal" placeholder="0.00"
      oninput="weightConverter(this.id,this.value)" onchange="weightConverter(this.id,this.value)">
    <span class="unit-tag">Sm³</span>
  </div>

  <div class="field">
    <label>Megawatt hours</label>
    <input id="inputMWh" type="number" inputmode="decimal" placeholder="0.00"
      oninput="weightConverter(this.id,this.value)" onchange="weightConverter(this.id,this.value)">
    <span class="unit-tag">MWh</span>
  </div>

  <div class="field">
    <label>Standard cubic feet</label>
    <input id="inputSCF" type="number" inputmode="decimal" placeholder="0.00"
      oninput="weightConverter(this.id,this.value)" onchange="weightConverter(this.id,this.value)">
    <span class="unit-tag">scf</span>
  </div>

  <div class="field">
    <label>Million BTU</label>
    <input id="inputMMbtu" type="number" inputmode="decimal" placeholder="0.00"
      oninput="weightConverter(this.id,this.value)" onchange="weightConverter(this.id,this.value)">
    <span class="unit-tag">MMBTU</span>
  </div>

</div>

<script>
  /* ── Tab switching ─────────────────────────────────────────── */
  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b, i) =>
      b.classList.toggle('active', (i === 0) === (tab === 'price'))
    );
    document.getElementById('panel-price').classList.toggle('active', tab === 'price');
    document.getElementById('panel-energy').classList.toggle('active', tab === 'energy');
  }

  /* ── Live FX rates (Norges Bank) ───────────────────────────── */
  const NB = 'https://data.norges-bank.no/api/data/EXR/B.{}.NOK.SP?format=sdmx-json&lastNObservations=1&locale=en';
  function nbRate(data) {
    return parseFloat(data.data.dataSets[0].series['0:0:0:0'].observations['0'][0]);
  }

  async function fetchFX() {
    const statusEl = document.getElementById('fxStatus');
    try {
      const [usdRes, eurRes, gbpRes] = await Promise.all([
        fetch(NB.replace('{}','USD')), fetch(NB.replace('{}','EUR')), fetch(NB.replace('{}','GBP'))
      ]);
      const [usd, eur, gbp] = await Promise.all([usdRes.json(), eurRes.json(), gbpRes.json()]);
      const usdNok = nbRate(usd), eurNok = nbRate(eur), gbpNok = nbRate(gbp);
      document.getElementById('inputEURUSD').value = (eurNok / usdNok).toFixed(4);
      document.getElementById('inputGBPUSD').value = (gbpNok / usdNok).toFixed(4);
      statusEl.textContent = 'Live rates from Norges Bank ✓';
      statusEl.className = 'fx-status loaded';
    } catch(e) {
      statusEl.textContent = 'Could not fetch live rates';
      statusEl.className = 'fx-status error';
    }
  }
  fetchFX();

  /* ── Price converter ───────────────────────────────────────── */
  const P = {
    boePerSM3: 0.006293, mmbuPerSM3: 0.037913,
    mjPerSM3: 40, mjPerMWh: 3.6,
    pencePerGBP: 100, thermPerMMbtu: 10
  };

  function priceConverter(sourceprice, valPrice) {
    valPrice = parseFloat(valPrice);
    if (isNaN(valPrice)) return;
    const eurUsd = parseFloat(document.getElementById('inputEURUSD').value);
    const gbpUsd = parseFloat(document.getElementById('inputGBPUSD').value);
    const mwhPerSM3  = P.mjPerSM3 / P.mjPerMWh / 1000;
    const mmbuPerBoe = P.mmbuPerSM3 / P.boePerSM3;

    function set(id, val) {
      if (id !== sourceprice) document.getElementById(id).value = val.toFixed(2);
    }

    function usdMmbtuToAll(usdMmbtu) {
      set('inputUSDmmbtu', usdMmbtu);
      set('inputUSDboe',   usdMmbtu * mmbuPerBoe);
      set('inputEURmwh',   usdMmbtu / eurUsd * P.mmbuPerSM3 / mwhPerSM3);
      set('inputGBPtherm', usdMmbtu / gbpUsd * P.thermPerMMbtu);
    }

    if (sourceprice === 'inputUSDboe')   usdMmbtuToAll(valPrice / mmbuPerBoe);
    if (sourceprice === 'inputUSDmmbtu') usdMmbtuToAll(valPrice);
    if (sourceprice === 'inputEURmwh')   usdMmbtuToAll(valPrice * eurUsd * mwhPerSM3 / P.mmbuPerSM3);
    if (sourceprice === 'inputGBPtherm') usdMmbtuToAll(valPrice * gbpUsd / P.thermPerMMbtu);
    if (sourceprice === 'inputEURUSD' || sourceprice === 'inputGBPUSD') {
      const boe = parseFloat(document.getElementById('inputUSDboe').value);
      if (!isNaN(boe) && boe !== 0) usdMmbtuToAll(boe / mmbuPerBoe);
    }
  }

  /* ── Energy / weight converter ─────────────────────────────── */
  const C = {
    boePerSM3: 0.006293, mjPerSM3: 40,
    scfPerSM3: 35.315, mmbuPerSM3: 0.037913, mjPerMWh: 3.6
  };

  function weightConverter(source, valNum) {
    valNum = parseFloat(valNum);
    if (isNaN(valNum)) return;
    const mwhPerSM3 = C.mjPerSM3 / C.mjPerMWh / 1000;
    const sm3 = source === 'inputBoe'   ? valNum / C.boePerSM3 :
                source === 'inputSM3'   ? valNum :
                source === 'inputMWh'   ? valNum / mwhPerSM3 :
                source === 'inputSCF'   ? valNum / C.scfPerSM3 :
                source === 'inputMMbtu' ? valNum / C.mmbuPerSM3 : NaN;
    if (isNaN(sm3)) return;
    const ws = (id, val) => { if (id !== source) document.getElementById(id).value = val.toFixed(2); };
    ws('inputBoe',   sm3 * C.boePerSM3);
    ws('inputSM3',   sm3);
    ws('inputMWh',   sm3 * mwhPerSM3);
    ws('inputSCF',   sm3 * C.scfPerSM3);
    ws('inputMMbtu', sm3 * C.mmbuPerSM3);
  }
</script>
</body>
</html>
