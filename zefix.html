<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zefix lookup</title>

<style>
*, *::before, *::after { box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #eef1f6;
  color: #1a1a2e;
  margin: 0;
  padding: 2rem 1rem 4rem;
}

/* Layout */
.container { max-width: 780px; margin: 0 auto; }

/* Header */
.page-header { display:flex; align-items:center; gap:0.7rem; margin-bottom:0.4rem; }
.logo {
  width:36px; height:36px;
  background:#dc2626;
  border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  color:#fff; font-weight:bold;
}
h1 { margin:0; font-size:1.5rem; }
.subtitle { margin-left:44px; color:#64748b; font-size:0.9rem; margin-bottom:1.5rem; }

/* Search */
.search-row { display:flex; gap:0.5rem; margin-bottom:1.2rem; }
#searchInput {
  flex:1;
  padding:0.7rem 1rem;
  border-radius:10px;
  border:1.5px solid #cbd5e1;
}
button {
  background:#dc2626;
  color:white;
  border:none;
  padding:0.7rem 1.4rem;
  border-radius:10px;
  cursor:pointer;
}

/* Result list */
.results-list { list-style:none; padding:0; margin:0; }
.results-list li {
  padding:0.8rem 1rem;
  cursor:pointer;
}
.results-list li:hover { background:#fff1f2; }

.result-name { font-weight:600; }
.result-sub { font-size:0.82rem; color:#64748b; }

/* Card */
.card {
  background:white;
  border-radius:14px;
  margin-top:1rem;
  overflow:hidden;
}
.card-header {
  padding:0.9rem 1.4rem;
  background:#f8fafc;
  border-bottom:1px solid #eee;
  font-size:0.8rem;
  font-weight:bold;
}
.card-body { padding:1rem 1.4rem; }

/* Fields */
.field-row {
  display:flex; gap:0.5rem;
  padding:0.45rem 0;
  border-bottom:1px solid #f1f5f9;
}
.field-row:last-child { border-bottom:none; }

.field-label {
  width:170px;
  font-size:0.75rem;
  color:#94a3b8;
}
.field-value { flex:1; }

/* Buttons */
.copy-btn {
  font-size:0.7rem;
  padding:0.2rem 0.5rem;
  border:1px solid #ddd;
  background:#f9f9f9;
  border-radius:5px;
  cursor:pointer;
}

.link-btn {
  font-size:0.7rem;
  padding:0.2rem 0.5rem;
  border-radius:5px;
  border:1px solid;
  text-decoration:none;
}
.link-zefix   { background:#fee2e2; border-color:#fecaca; color:#991b1b; }
.link-canton  { background:#dbeafe; border-color:#bfdbfe; color:#1e40af; }

/* Status */
.badge {
  padding:0.1rem 0.4rem;
  font-size:0.7rem;
  border-radius:4px;
}
.green { background:#dcfce7; color:#15803d; }
.red { background:#fee2e2; color:#991b1b; }
.yellow { background:#fef9c3; color:#854d0e; }

.hidden { display:none; }
</style>
</head>

<body>

<div class="container">

<div class="page-header">
  <div class="logo">CH</div>
  <h1>Zefix lookup</h1>
</div>
<p class="subtitle">Search Swiss companies (all cantons)</p>

<div class="search-row">
  <input id="searchInput" placeholder="CHE-123.456.789, EHRA-ID or company name">
  <button onclick="doSearch()">Search</button>
</div>

<div id="status"></div>
<div id="results"></div>

<div id="company" class="card hidden">
  <div class="card-header">Company details</div>
  <div id="companyBody" class="card-body"></div>
</div>

</div>

<script>

const BASE = "https://zefix.batil-kjekken.workers.dev";

/* Helpers */
function stat(msg){ document.getElementById("status").innerText = msg || ""; }
function clear(){
  document.getElementById("results").innerHTML="";
  document.getElementById("company").classList.add("hidden");
}

async function api(path){
  const r = await fetch(BASE + path);
  if(!r.ok) throw new Error();
  return r.json();
}

/* Search */
async function doSearch(){
  const q = document.getElementById("searchInput").value.trim();
  if(!q) return;

  clear();
  stat("Searching...");

  try {
    if(q.startsWith("CHE")){
      const d = await api("/company/uid/" + q.replace(/\D/g,""));
      showCompany(d[0]);
      return;
    }

    const list = await api("/search?q=" + encodeURIComponent(q));

    if(list.length===1){
      showFull(list[0]);
      return;
    }

    showList(list);

  } catch {
    stat("Error");
  }
}

/* Result list */
function showList(list){
  stat("");
  const r = document.getElementById("results");

  list.slice(0,10).forEach(c=>{
    const el = document.createElement("li");
    el.innerHTML =
      `<div class="result-name">${c.name}</div>
       <div class="result-sub">${c.uid} · EHRA ${c.ehraid}</div>`;
    el.onclick = ()=> showFull(c);
    r.appendChild(el);
  });
}

/* Load full */
async function showFull(c){
  stat("Loading...");
  const full = await api("/company/ehraid/" + c.ehraid);
  stat("");
  showCompany(full);
}

/* Render */
function showCompany(c){

  const addr = c.address || {};
  const zefix = c.zefixDetailWeb?.en || "";
  const excerpt = c.cantonalExcerptWeb || "";

  const html = `
    ${row("Name", c.name)}
    ${row("UID", c.uid)}
    ${row("EHRA", c.ehraid)}

    ${statusRow(c.status)}

    ${row("Legal form", c.legalForm?.name?.en)}
    ${row("Seat", c.legalSeat)}
    ${row("Canton", c.canton)}

    ${row("ZIP", addr.swissZipCode)}
    ${row("City", addr.city)}

    ${multi("Address",
      (addr.street||"") + " " + (addr.houseNumber||""),
      (addr.swissZipCode||"") + " " + (addr.city||"")
    )}

    <hr>

    ${row("Capital", (c.capitalNominal||"") + " " + (c.capitalCurrency||""))}
    ${row("Purpose", c.purpose)}

    <hr>

    ${link("Zefix", zefix, "link-zefix")}
    ${link("Cantonal excerpt", excerpt, "link-canton")}
  `;

  document.getElementById("company").classList.remove("hidden");
  document.getElementById("companyBody").innerHTML = html;
}

/* UI helpers */

function row(l,v=""){
  return `<div class="field-row">
    <span class="field-label">${l}</span>
    <span class="field-value">${v||"-"}</span>
  </div>`;
}

function multi(l,a,b){
  return `<div class="field-row">
    <span class="field-label">${l}</span>
    <span class="field-value">${a}<br>${b}</span>
  </div>`;
}

function statusRow(s){
  const map = {
    ACTIVE:["Active","green"],
    CANCELLED:["Deleted","red"],
    BEING_CANCELLED:["Being deleted","yellow"]
  };
  const m = map[s]||[s,""];
  return `<div class="field-row">
    <span class="field-label">Status</span>
    <span class="field-value"><span class="badge ${m[1]}">${m[0]}</span></span>
  </div>`;
}

function link(label,url,cls){
  if(!url) return row(label,"-");
  return `<div class="field-row">
    <span class="field-label">${label}</span>
    <span class="field-value">${url}</span>
    <a href="${url}" target="_blank" class="link-btn ${cls}">Open ↗</a>
  </div>`;
}

</script>

</body>
</html>
